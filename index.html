<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowingS ARCHIVE</title>
    <style>
        :root { --gold: #d4af37; --red: #ff4444; --blue: #44aaff; --purple: #b044ff; --bg: #0a0e14; --card: #1c2b3e; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color: var(--text); height: 100vh; overflow: hidden; font-size: 15px; line-height: 1.5; }
        
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .gate-box { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; width: 88%; max-width: 350px; background: #161c24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #main { display: none; flex-direction: column; height: 100vh; }
        header { background: #161c24; padding: 18px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; cursor: pointer; }
        header h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
        
        .search-container { background: #161c24; padding: 12px 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 16px; outline: none; }
        
        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
        
        .sticky-tabs { position: sticky; top: -15px; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tabs { display: flex; justify-content: center; gap: 6px; }
        .tab-btn { background: #1c2b3e; color: #888; border: none; padding: 12px 5px; border-radius: 8px; font-size: 13px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        
        .sub-tabs { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sub-btn { flex-shrink: 0; padding: 10px 16px; font-size: 13px; background: #0a0e14; color: #888; border: 1px solid #333; border-radius: 6px; white-space: nowrap; font-weight: bold; }
        .sub-btn.active-sub { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        /* 그리드 및 카드 정렬 수정 */
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: stretch; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d343e; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; cursor: pointer; height: 100%; }
        .card:active { transform: scale(0.98); }
        
        .card-header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid #333; flex-shrink: 0; }
        .card-title { font-size: 14px; color: var(--gold); font-weight: bold; word-break: break-all; }
        
        .deck-heroes-preview { display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .deck-preview-text { padding: 12px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #333; margin-top: auto; }

        /* 모달 상세 정렬 수정 */
        .modal-content-box { background: #161c24; width: 95%; max-width: 500px; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; position: relative; max-height: 85vh; display: flex; flex-direction: column; }
        .deck-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; overflow-y: auto; flex: 1; }
        .deck-info-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; }
        .deck-info-box.full { grid-column: span 2; }
        .info-label { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; }
        .info-value { color: #fff; font-size: 14px; line-height: 1.6; word-break: break-all; white-space: pre-wrap; }

        /* 관리자 바 고정 */
        .admin-edit-bar { display: flex; border-top: 1px solid #444; background: #000; margin-top: auto; width: 100%; }
        .edit-btn, .del-btn { padding: 14px; font-size: 14px; flex: 1; border: none; cursor: pointer; font-weight: bold; }
        .edit-btn { background: #1c2b3e; color: #66b2ff; }
        .del-btn { background: #421010; color: #ff8888; border-left: 1px solid #333; }

        /* 이하 기존 스타일 동일 */
        #admin, #deckEditor { display: none; background: #161c24; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        #deckEditor { position: fixed; inset: 0; z-index: 11000; background: var(--bg); border: none; border-radius: 0; overflow-y: auto; height: 100vh; display: none; flex-direction: column; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 15px; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; }
        .hero-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #444; object-fit: cover; }
        .hero-name { font-size: 12px; margin-top: 8px; color: #fff; text-align: center; }
        .close-circle { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); width: 34px; height: 34px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 10; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); font-size: 45px; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
    </style>
</head>

</html>
