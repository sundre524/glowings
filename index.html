<style>
    /* 1. 카드 하단 여백 없이 꽉 차게 수정 */
    .card { 
        background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d343e; 
        display: flex; flex-direction: column; position: relative; height: 100%; /* 높이 100% */
    }
    .card-img-area { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #000; }
    .card-img-area img { width: 100%; height: 100%; object-fit: cover; }
    
    /* 오른쪽 전략덱 카드의 중앙 영역을 꽉 채움 */
    .deck-heroes-preview { 
        flex-grow: 1; /* 이 부분이 핵심: 남은 공간을 다 차지함 */
        display: flex; justify-content: center; align-items: center; gap: 8px; padding: 15px; 
        background: rgba(0,0,0,0.1); 
    }

    /* 2. 사진 슬라이더 좌우 버튼 스타일 */
    .slider-wrapper { position: relative; width: 100%; }
    .slider-content { display: flex; overflow-x: auto; snap-type: x mandatory; scrollbar-width: none; }
    .slider-content::-webkit-scrollbar { display: none; }
    .slide-item { flex: 0 0 100%; snap-align: start; display: flex; justify-content: center; }
    
    .nav-btn { 
        position: absolute; top: 50%; transform: translateY(-50%); 
        background: rgba(0,0,0,0.2); color: white; border: none; padding: 20px 10px; 
        cursor: pointer; z-index: 10; font-size: 20px; transition: 0.3s;
    }
    .nav-btn:hover { background: rgba(212, 175, 55, 0.5); }
    .prev-btn { left: 0; border-radius: 0 10px 10px 0; }
    .next-btn { right: 0; border-radius: 10px 0 0 10px; }
</style>

<script>
    // [기능 수정] 사진 및 비디오 오픈 (슬라이드 버튼 추가 버전)
    const openMedia = (p) => {
        const container = document.getElementById('mediaContainer');
        const dotsArea = document.getElementById('dotsArea');
        container.innerHTML = ''; dotsArea.innerHTML = '';

        const yId = getYTubeId(p.links?.[0]);
        if (yId) {
            container.innerHTML = `<iframe width="100%" style="aspect-ratio:16/9; border:none;" src="https://www.youtube.com/embed/${yId}?autoplay=1" allowfullscreen></iframe>`;
        } else {
            const wrapper = document.createElement('div'); wrapper.className = 'slider-wrapper';
            const slider = document.createElement('div'); slider.className = 'slider-content';
            
            // 좌우 버튼 추가
            if (p.links && p.links.length > 1) {
                const bPrev = document.createElement('button'); bPrev.className = 'nav-btn prev-btn'; bPrev.innerHTML = '&#10094;';
                const bNext = document.createElement('button'); bNext.className = 'nav-btn next-btn'; bNext.innerHTML = '&#10095;';
                bPrev.onclick = () => slider.scrollBy({left: -slider.clientWidth, behavior: 'smooth'});
                bNext.onclick = () => slider.scrollBy({left: slider.clientWidth, behavior: 'smooth'});
                wrapper.appendChild(bPrev); wrapper.appendChild(bNext);
            }

            p.links.forEach((url, i) => {
                const item = document.createElement('div'); item.className = 'slide-item';
                item.innerHTML = `<img src="${url}" style="max-width:100%; max-height:80vh; object-fit:contain;">`;
                slider.appendChild(item);
                const dot = document.createElement('div'); dot.className = `dot ${i===0?'active':''}`;
                dotsArea.appendChild(dot);
            });

            slider.onscroll = () => {
                const idx = Math.round(slider.scrollLeft / slider.clientWidth);
                document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
            };
            wrapper.appendChild(slider);
            container.appendChild(wrapper);
        }
        document.getElementById('mediaModal').style.display = 'flex';
    };

    // [기능 복구] 전략 덱 상세보기 (팝업 크게 보기)
    const showDeckDetail = (p) => {
        document.getElementById('deckModalTitle').innerText = p.title;
        
        // 영웅 목록 표시
        const hm = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hm[h.title] = h);
        let hHtml = '';
        (p.picks || []).forEach(n => {
            if(hm[n]) hHtml += `<div style="text-align:center;"><img src="${hm[n].img}" style="width:50px; height:50px; border-radius:50%; border:2px solid var(--gold);"><div style="font-size:10px; margin-top:5px;">${n}</div></div>`;
        });
        document.getElementById('deckModalHeroes').innerHTML = hHtml;

        // 상세 스펙 정보 구성
        const specs = [
            {l:'⚡ 속공', v:p.speed}, {l:'💍 반지', v:p.ring}, {l:'🐾 펫', v:p.pet}, 
            {l:'📜 스킬', v:p.skill}, {l:'🛡️ 진형', v:p.form}, {l:'📝 메모', v:p.extra}
        ];
        let dHtml = '';
        specs.forEach(s => { if(s.v) dHtml += `<div class="deck-info-box"><span class="info-label">${s.l}</span><div class="info-value">${s.v}</div></div>`; });
        
        document.getElementById('deckModalDetails').innerHTML = dHtml || '<p style="grid-column:span 2; text-align:center; padding:20px; color:#555;">상세 정보가 없습니다.</p>';
        document.getElementById('deckModal').style.display = 'flex';
    };
</script>
