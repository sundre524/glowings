<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowingS ARCHIVE</title>
    <style>
        :root { --gold: #d4af37; --red: #ff4444; --blue: #44aaff; --purple: #b044ff; --bg: #0a0e14; --card: #1c2b3e; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color: var(--text); height: 100vh; overflow: hidden; font-size: 15px; line-height: 1.5; }
        
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .gate-box { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; width: 88%; max-width: 350px; background: #161c24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #main { display: none; flex-direction: column; height: 100vh; }
        header { background: #161c24; padding: 18px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; cursor: pointer; }
        header h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
        
        .search-container { background: #161c24; padding: 12px 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 16px; outline: none; }
        
        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
        
        .sticky-tabs { position: sticky; top: -15px; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tabs { display: flex; justify-content: center; gap: 6px; }
        .tab-btn { background: #1c2b3e; color: #888; border: none; padding: 12px 5px; border-radius: 8px; font-size: 13px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        
        .sub-tabs { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sub-btn { flex-shrink: 0; padding: 10px 16px; font-size: 13px; background: #0a0e14; color: #888; border: 1px solid #333; border-radius: 6px; white-space: nowrap; font-weight: bold; }
        .sub-btn.active-sub { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d343e; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; cursor: pointer; height: 100%; }
        .card-header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid #333; }
        .card-title { font-size: 14px; color: var(--gold); font-weight: bold; }
        
        /* 전략덱 카드 내부 여백 최적화 */
        .deck-heroes-preview { flex-grow: 1; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 25px 15px; background: rgba(0,0,0,0.2); }
        .deck-preview-text { padding: 12px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #333; margin-top: auto; }

        /* [추가] 사진 슬라이더 및 PC용 네비게이션 버튼 */
        .slider-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .slider-content { display: flex; overflow-x: auto; snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; width: 100%; }
        .slider-content::-webkit-scrollbar { display: none; }
        .slide-item { flex: 0 0 100%; snap-align: start; display: flex; justify-content: center; align-items: center; }
        .slide-item img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); color: #fff; border: none; width: 45px; height: 70px; font-size: 24px; cursor: pointer; z-index: 100; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(212, 175, 55, 0.5); }
        .nav-prev { left: 0; border-radius: 0 10px 10px 0; }
        .nav-next { right: 0; border-radius: 10px 0 0 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content-box { background: #161c24; width: 95%; max-width: 500px; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; position: relative; max-height: 90vh; display: flex; flex-direction: column; }
        .close-circle { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); width: 34px; height: 34px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 150; }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; padding-bottom: 20px; }
        .hero-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #444; object-fit: cover; }
        .border-old { border-color: var(--purple) !important; }
        .border-leg { border-color: var(--gold) !important; }
        .border-rare { border-color: var(--blue) !important; }
        .hero-name { font-size: 12px; margin-top: 8px; color: #fff; text-align: center; }

        .deck-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; overflow-y: auto; }
        .deck-info-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 12px; padding: 14px; }
        .deck-info-box.full { grid-column: span 2; }
        .info-label { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; }
        .info-value { color: #fff; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }

        #admin, #deckEditor { display: none; background: #161c24; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        
        #deckEditor { position: fixed; inset: 0; z-index: 11000; background: var(--bg); border: none; border-radius: 0; overflow-y: auto; height: 100vh; display: none; flex-direction: column; }
        .editor-header { background: #161c24; border-bottom: 1px solid var(--gold); padding: 18px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .editor-content { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 50px; }
        
        .admin-edit-bar { display: flex; border-top: 1px solid #444; background: #000; }
        .edit-btn, .del-btn { padding: 14px; font-size: 14px; flex: 1; border: none; cursor: pointer; font-weight: bold; }
        .edit-btn { background: #1c2b3e; color: #66b2ff; }
        .del-btn { background: #421010; color: #ff8888; border-left: 1px solid #333; }
        
        .dots { display: flex; justify-content: center; gap: 8px; padding: 15px 0; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: 0.3s; }
        .dot.active { background: var(--gold); transform: scale(1.3); }
    </style>
</head>
<body>

<div id="gatekeeper"><div class="gate-box"><h2 style="color:var(--gold); margin-bottom:20px;">🛡️ GlowingS</h2><input type="password" id="pw" placeholder="ACCESS CODE" style="width:100%; padding:15px; border-radius:10px; margin-bottom:15px; border:none; text-align:center; font-size:18px; background:#000; color:var(--gold);"><button class="btn-gold" onclick="checkGate()">ACCESS ENTER</button></div></div>

<div id="deckEditor">
    <div class="editor-header"><h2 style="color:var(--gold);">⚔️ 전략 덱 상세 설정</h2></div>
    <div class="editor-content">
        <label class="info-label">덱 제목</label><input type="text" id="edTit">
        <label class="info-label">덱 종류</label><select id="edType"><option value="offense">⚔️ 공격 덱</option><option value="defense">🛡️ 방어 덱</option></select>
        <label style="display:flex; align-items:center; gap:10px; color:var(--gold); font-weight:bold; margin-bottom:15px;"><input type="checkbox" id="edMain" style="width:20px; height:20px; margin:0;"> 메인 화면(홈)에 표시</label>
        <label class="info-label">영웅 배치</label>
        <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #333;">
            <div style="margin-bottom:10px;"><select id="edP1"></select></div>
            <div style="margin-bottom:10px;"><select id="edP2"></select></div>
            <div><select id="edP3"></select></div>
        </div>
        <div style="background:rgba(212,175,55,0.05); padding:15px; border-radius:12px; border:1px solid #444;">
            <label class="info-label">⚡ 속공</label><input type="text" id="edSpeed">
            <label class="info-label">💍 반지</label><input type="text" id="edRing">
            <label class="info-label">🐾 펫</label><input type="text" id="edPet">
            <label class="info-label">📜 스킬 순서</label><input type="text" id="edSkill">
            <label class="info-label">🛡️ 진형</label><input type="text" id="edForm">
            <label class="info-label">📝 특이사항</label><textarea id="edExtra" style="height: 120px;"></textarea>
        </div>
        <button class="btn-gold" id="edSaveBtn" onclick="saveDeckEdit()">✅ 저장 완료</button>
        <button class="btn-gold" onclick="closeDeckEditor()" style="background:#333; color:#fff; margin-top:10px;">취소</button>
    </div>
</div>

<div id="main">
    <header onclick="askAdmin()"><h1>🛡️ GlowingS ARCHIVE</h1></header>
    <div class="search-container"><input type="text" id="mainSearch" class="search-box" placeholder="공략, 영웅, 덱 검색..." onkeyup="handleSearch(event)"></div>
    <div class="content-scroll">
        <div class="container">
            <div id="admin">
                <div id="adminTitle" style="color:var(--gold); font-weight:bold; margin-bottom:15px; font-size:1.1rem;">📤 자료 등록</div>
                <select id="catIn">
                    <option value="photo">📸 사진첩</option>
                    <option value="hero_reg">👤 영웅 등록</option>
                    <option value="video_pve">🎥 PVE 공략</option>
                    <option value="video_pvp">🎥 PVP 공략</option>
                    <option value="deck_reg">⚔️ 전략 덱 등록</option>
                </select>
                <div id="subCatUI" style="display:none;"><label class="info-label">세부 분류</label><select id="subCatIn"></select></div>
                <div id="heroGradeSet" style="display:none;"><select id="gradeIn"><option value="old">🟣 구세나</option><option value="leg">🟡 전설</option><option value="rare">🔵 희귀</option></select></div>
                <input type="text" id="titIn" placeholder="제목을 입력하세요">
                <label style="display:flex; align-items:center; gap:10px; color:var(--gold); font-weight:bold; margin-bottom:15px;"><input type="checkbox" id="mainIn" style="width:20px; height:20px; margin:0;"> 메인 화면 표시</label>
                <div id="fileArea"><input type="file" id="fileIn" multiple><input type="text" id="linkIn" placeholder="유튜브 링크" style="display:none;"></div>
                <button class="btn-gold" id="upBtn" onclick="doUpload()">💾 저장하기</button>
                <button class="btn-gold" onclick="resetAdmin()" style="background:#333; color:#fff; margin-top:10px;">취소</button>
            </div>

            <div class="sticky-tabs">
                <div class="tabs">
                    <button class="tab-btn active" onclick="goTab('all', this)">홈</button>
                    <button class="tab-btn" onclick="goTab('photo', this)">사진</button>
                    <button class="tab-btn" onclick="goTab('video_pve', this)">PVE</button>
                    <button class="tab-btn" onclick="goTab('video_pvp', this)">PVP</button>
                    <button class="tab-btn" style="border:1px solid var(--gold); color:var(--gold);" onclick="goTab('guild', this)">길드전</button>
                </div>
                <div id="subTabArea" style="display:none;"><div class="sub-tabs" id="subTabList"></div></div>
            </div>

            <div id="list" class="grid"></div>
            <div id="decks" class="grid" style="display:none;"></div>
            <div id="heroes" style="display:none;"></div>
        </div>
    </div>
</div>

<div id="mediaModal" class="modal" onclick="closeModalOnBg(event, 'mediaModal')">
    <div class="close-circle" onclick="closeModal('mediaModal')">&times;</div>
    <div id="mediaContainer" style="width:100%; max-width:900px;"></div>
    <div id="dotsArea" class="dots"></div>
</div>

<div id="deckModal" class="modal" onclick="closeModalOnBg(event, 'deckModal')">
    <div class="modal-content-box">
        <div class="close-circle" onclick="closeModal('deckModal')">&times;</div>
        <div id="deckModalTitle" style="padding:20px; text-align:center; color:var(--gold); font-weight:bold; border-bottom:1px solid #333;"></div>
        <div id="deckModalHeroes" style="display:flex; justify-content:center; gap:15px; padding:25px 10px; background:rgba(0,0,0,0.2);"></div>
        <div id="deckModalDetails" class="deck-detail-grid"></div>
    </div>
</div>

<div id="heroModal" class="modal" onclick="closeModalOnBg(event, 'heroModal')">
    <div class="gate-box" style="max-width:400px; width:92%;">
        <div class="close-circle" onclick="closeModal('heroModal')">&times;</div>
        <img id="mHeroImg" class="hero-img" style="width:90px; height:90px; margin-bottom:10px;">
        <h3 id="mHeroName" style="color:var(--gold);"></h3>
        <div id="mUsage" style="max-height:280px; overflow-y:auto; text-align:left; margin-top:15px; border-top:1px solid #333; padding-top:10px;"></div>
    </div>
</div>

<script>
    const CONFIG = { API: "https://api.jsonbin.io/v3/b/69ae6f09d0ea881f40ff0f44", KEY: "$2a$10$hcOVgg3LvdoRgRZdayPtVOA3gbxyOY7UibDbi/jcJnMlPiok/xlcO", CLOUD: "djef3ylqf", PRESET: "guild_preset" };
    let db = { posts: [] }, isAdmin = false, curFilter = 'all', curSub = '전체', keyword = "", editId = null;

    window.onload = () => {
        if(sessionStorage.getItem('auth') === 'true') {
            document.getElementById('gatekeeper').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            isAdmin = sessionStorage.getItem('admin') === 'true';
            if(isAdmin) document.getElementById('admin').style.display = 'block';
            fetchData();
        }
    };

    const checkGate = () => { if(document.getElementById('pw').value === 'glowing99') { sessionStorage.setItem('auth', 'true'); location.reload(); } };
    const askAdmin = () => { if(!isAdmin && prompt("ADMIN CODE:") === '1005') { sessionStorage.setItem('admin', 'true'); location.reload(); } };
    const getYTubeId = (url) => { const m = (url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/|.*shorts\/))([^&?]+)/); return m ? m[1] : null; };

    const fetchData = async () => {
        try {
            const res = await fetch(`${CONFIG.API}/latest`, { headers: { "X-Master-Key": CONFIG.KEY, "X-Bin-Meta": "false" }, cache: 'no-store' });
            const data = await res.json(); db.posts = data.posts || []; updateSelectors(); render();
        } catch(e) { console.error(e); }
    };

    const updateSelectors = () => {
        const h = db.posts.filter(p => p.category === 'hero_reg').sort((a,b) => a.title.localeCompare(b.title));
        ['edP1', 'edP2', 'edP3'].forEach(id => {
            const el = document.getElementById(id); if(!el) return;
            let o = '<option value="">선택 안함</option>'; h.forEach(x => o += `<option value="${x.title}">${x.title}</option>`); el.innerHTML = o;
        });
    };

    const render = () => {
        const listEl = document.getElementById('list'), decksEl = document.getElementById('decks'), heroesEl = document.getElementById('heroes');
        listEl.innerHTML = ''; decksEl.innerHTML = ''; heroesEl.innerHTML = '';
        listEl.style.display = 'none'; decksEl.style.display = 'none'; heroesEl.style.display = 'none';
        
        const hasSub = ['guild', 'video_pve', 'video_pvp'].includes(curFilter);
        document.getElementById('subTabArea').style.display = hasSub ? 'block' : 'none';

        if(hasSub) {
            let sHtml = `<button class="sub-btn ${curSub==='전체'?'active-sub':''}" onclick="goSub('전체')">전체</button>`;
            if(curFilter === 'guild') {
                sHtml += `<button class="sub-btn ${curSub==='offense'?'active-sub':''}" onclick="goSub('offense')">⚔️ 공격</button><button class="sub-btn ${curSub==='defense'?'active-sub':''}" onclick="goSub('defense')">🛡️ 방어</button><button class="sub-btn ${curSub==='hero'?'active-sub':''}" onclick="goSub('hero')">👤 영웅</button>`;
            } else if(curFilter === 'video_pve') {
                ['공성전', '강림', '레이드', '돌발레이드', '무한의탑', '시련의탑', '모험'].forEach(m => sHtml += `<button class="sub-btn ${curSub===m?'active-sub':''}" onclick="goSub('${m}')">${m}</button>`);
            } else if(curFilter === 'video_pvp') {
                ['결투장', '상급 결투장', '실시간 결투장'].forEach(m => sHtml += `<button class="sub-btn ${curSub===m?'active-sub':''}" onclick="goSub('${m}')">${m}</button>`);
            }
            document.getElementById('subTabList').innerHTML = sHtml;
        }

        let filtered = db.posts.filter(p => {
            if(keyword && !(p.title||"").toLowerCase().includes(keyword.toLowerCase())) return false;
            if(curFilter === 'all') return p.isMain === true;
            if(curFilter === 'guild') {
                if(curSub === 'hero') return p.category === 'hero_reg';
                return p.category === 'deck_reg' && (curSub === '전체' || p.deckType === curSub);
            }
            return p.category === curFilter && (curSub === '전체' || p.subCategory === curSub);
        });

        if(curFilter === 'guild' && curSub === 'hero') {
            heroesEl.style.display = 'block';
            const gm = { 'old': { t: '🟣 구세나', c: 'var(--purple)', h: [] }, 'leg': { t: '🟡 전설', c: 'var(--gold)', h: [] }, 'rare': { t: '🔵 희귀', c: 'var(--blue)', h: [] } };
            filtered.forEach(h => { if(gm[h.grade]) gm[h.grade].h.push(h); else gm['leg'].h.push(h); });
            ['old', 'leg', 'rare'].forEach(g => {
                if(gm[g].h.length > 0) {
                    const sec = document.createElement('div'); 
                    sec.innerHTML = `<h3 style="color:${gm[g].c}; margin: 25px 0 10px 5px; border-bottom:1px solid #333; padding-bottom:5px;">${gm[g].t}</h3>`;
                    const grid = document.createElement('div'); grid.className = 'hero-grid';
                    gm[g].h.forEach(h => {
                        const u = document.createElement('div'); u.className = 'hero-unit'; u.style.textAlign = 'center'; u.style.cursor = 'pointer';
                        u.innerHTML = `<img src="${h.img}" class="hero-img border-${g}" loading="lazy"><div class="hero-name">${h.title}</div>`;
                        u.onclick = () => showHeroDetail(h); grid.appendChild(u);
                    });
                    sec.appendChild(grid); heroesEl.appendChild(sec);
                }
            });
        } else {
            const isDeckView = curFilter === 'guild' && curSub !== 'hero';
            const container = isDeckView ? decksEl : listEl;
            container.style.display = 'grid';
            [...filtered].reverse().forEach(p => {
                if(p.category === 'deck_reg') container.appendChild(createDeckPreviewCard(p));
                else container.appendChild(createMediaCard(p));
            });
        }
    };

    const createMediaCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        const yId = getYTubeId(p.links?.[0]);
        const t = yId ? `https://img.youtube.com/vi/${yId}/hqdefault.jpg` : (p.links?.[0] || p.img);
        div.innerHTML = `<div style="width:100%; aspect-ratio:16/9; position:relative; overflow:hidden;"><img src="${t}" style="width:100%; height:100%; object-fit:cover;" loading="lazy">${yId ? '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:40px;">▶️</div>' : ''}</div><div class="card-header"><div class="card-title">${p.title}</div></div>`;
        div.onclick = (e) => { if(!e.target.closest('.admin-edit-bar')) openMedia(p); };
        if(isAdmin) div.appendChild(createAdminBar(p.id, 'media')); return div;
    };

    const createDeckPreviewCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        const hm = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hm[h.title] = h);
        let hHtml = '';
        (p.picks || []).forEach(n => { if(hm[n]) hHtml += `<img src="${hm[n].img}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--gold); object-fit:cover;">`; });
        div.innerHTML = `<div class="card-header"><div class="card-title">${p.title}</div></div><div class="deck-heroes-preview">${hHtml || '<span style="color:#555">구성 정보 없음</span>'}</div><div class="deck-preview-text">상세 보기</div>`;
        div.onclick = (e) => { if(!e.target.closest('.admin-edit-bar')) showDeckDetail(p); };
        if(isAdmin) div.appendChild(createAdminBar(p.id, 'deck')); return div;
    };

    const openMedia = (p) => {
        const mc = document.getElementById('mediaContainer'), da = document.getElementById('dotsArea');
        mc.innerHTML = ''; da.innerHTML = '';
        const yId = getYTubeId(p.links?.[0]);
        if(yId) {
            mc.innerHTML = `<iframe width="100%" style="aspect-ratio:16/9; border:none; border-radius:10px;" src="https://www.youtube.com/embed/${yId}?autoplay=1" allowfullscreen></iframe>`;
        } else {
            const wrapper = document.createElement('div'); wrapper.className = 'slider-wrapper';
            const slider = document.createElement('div'); slider.className = 'slider-content';
            if(p.links && p.links.length > 1) {
                const bP = document.createElement('button'); bP.className = 'nav-btn nav-prev'; bP.innerHTML = '&#10094;';
                const bN = document.createElement('button'); bN.className = 'nav-btn nav-next'; bN.innerHTML = '&#10095;';
                bP.onclick = () => slider.scrollBy({left: -slider.clientWidth, behavior: 'smooth'});
                bN.onclick = () => slider.scrollBy({left: slider.clientWidth, behavior: 'smooth'});
                wrapper.appendChild(bP); wrapper.appendChild(bN);
            }
            p.links.forEach((url, i) => {
                const item = document.createElement('div'); item.className = 'slide-item';
                item.innerHTML = `<img src="${url}">`; slider.appendChild(item);
                const dot = document.createElement('div'); dot.className = `dot ${i===0?'active':''}`; da.appendChild(dot);
            });
            slider.onscroll = () => {
                const idx = Math.round(slider.scrollLeft / slider.clientWidth);
                document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
            };
            wrapper.appendChild(slider); mc.appendChild(wrapper);
        }
        document.getElementById('mediaModal').style.display = 'flex';
    };

    const showDeckDetail = (p) => {
        document.getElementById('deckModalTitle').innerText = p.title;
        const hm = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hm[h.title] = h);
        let hHtml = '';
        (p.picks || []).forEach(n => { if(hm[n]) hHtml += `<div style="text-align:center;"><img src="${hm[n].img}" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); object-fit:cover;"><div style="font-size:11px; margin-top:8px; color:#fff;">${n}</div></div>`; });
        document.getElementById('deckModalHeroes').innerHTML = hHtml;
        const specs = [{l:'⚡ 속공', v:p.speed}, {l:'💍 반지', v:p.ring}, {l:'🐾 펫', v:p.pet}, {l:'📜 스킬', v:p.skill}, {l:'🛡️ 진형', v:p.form}, {l:'📝 특이사항', v:p.extra, f:true}];
        let dHtml = '';
        specs.forEach(s => { if(s.v) dHtml += `<div class="deck-info-box ${s.f?'full':''}"><span class="info-label">${s.l}</span><div class="info-value">${s.v}</div></div>`; });
        document.getElementById('deckModalDetails').innerHTML = dHtml || '<p style="grid-column:span 2; text-align:center; padding:20px; color:#555;">정보 없음</p>';
        document.getElementById('deckModal').style.display = 'flex';
    };

    const showHeroDetail = (h) => {
        mHeroImg.src = h.img; mHeroName.innerText = h.title;
        const bc = h.grade === 'old' ? 'var(--purple)' : (h.grade === 'rare' ? 'var(--blue)' : 'var(--gold)');
        mHeroImg.style.borderColor = bc;
        const usage = db.posts.filter(p => p.category === 'deck_reg' && (p.picks||[]).includes(h.title));
        let uHtml = '<p style="font-size:13px; color:var(--gold); margin-bottom:10px; font-weight:bold;">💡 활용 중인 조합</p>';
        usage.forEach(u => uHtml += `<div style="background:#000; padding:12px; border-radius:8px; margin-bottom:8px; font-size:13px; border-left:3px solid var(--gold); cursor:pointer;" onclick="closeModal('heroModal'); showDeckDetail(db.posts.find(x=>x.id===${u.id}))">${u.title}</div>`);
        mUsage.innerHTML = usage.length > 0 ? uHtml : '<p style="text-align:center; color:#555; padding:20px;">조합 정보 없음</p>';
        document.getElementById('heroModal').style.display = 'flex';
    };

    const openDeckEditor = (id) => {
        const p = db.posts.find(x => x.id === id); if(!p) return;
        editId = id; edTit.value = p.title || ''; edType.value = p.deckType || 'offense'; edMain.checked = p.isMain || false;
        edP1.value = p.picks?.[0] || ''; edP2.value = p.picks?.[1] || ''; edP3.value = p.picks?.[2] || '';
        edSpeed.value = p.speed || ''; edRing.value = p.ring || ''; edPet.value = p.pet || '';
        edSkill.value = p.skill || ''; edForm.value = p.form || ''; edExtra.value = p.extra || '';
        document.getElementById('deckEditor').style.display = 'flex';
        closeModal('deckModal'); closeModal('heroModal');
    };

    const saveDeckEdit = async () => {
        const btn = document.getElementById('edSaveBtn'); if(!edTit.value) return alert("제목 필수");
        btn.innerText = "저장 중..."; btn.disabled = true;
        try {
            let t = db.posts.find(x => x.id === editId);
            t.title = edTit.value; t.deckType = edType.value; t.isMain = edMain.checked;
            t.picks = [edP1.value, edP2.value, edP3.value].filter(x => x);
            t.speed = edSpeed.value; t.ring = edRing.value; t.pet = edPet.value;
            t.skill = edSkill.value; t.form = edForm.value; t.extra = edExtra.value;
            await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) });
            location.reload();
        } catch(e) { alert("오류"); btn.innerText = "저장"; btn.disabled = false; }
    };

    const doUpload = async () => {
        const btn = document.getElementById('upBtn'); const files = fileIn.files;
        if(!titIn.value) return alert("제목 필수");
        btn.innerText = "처리 중..."; btn.disabled = true;
        try {
            let urls = [];
            if(files.length > 0) {
                for(let f of files) {
                    const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', CONFIG.PRESET);
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD}/image/upload`, { method:'POST', body:fd });
                    const d = await res.json(); urls.push(d.secure_url);
                }
            } else if(linkIn.value) urls.push(linkIn.value);

            const t = { id: Date.now(), category: catIn.value, title: titIn.value, links: urls, isMain: mainIn.checked, subCategory: subCatIn.value };
            if(t.category === 'hero_reg') { t.img = urls[0]; t.grade = gradeIn.value; }
            if(t.category === 'deck_reg') { t.deckType = 'offense'; t.picks = []; }
            
            db.posts.push(t);
            await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) });
            location.reload();
        } catch(e) { alert("실패"); btn.disabled = false; }
    };

    const createAdminBar = (id, type) => {
        const bar = document.createElement('div'); bar.className = 'admin-edit-bar';
        const eFunc = type === 'deck' ? `openDeckEditor(${id})` : `startEdit(${id})`;
        bar.innerHTML = `<button class="edit-btn" onclick="${eFunc}">수정</button><button class="del-btn" onclick="deleteItem(${id})">삭제</button>`; return bar;
    };

    window.startEdit = (id) => {
        const p = db.posts.find(x => x.id === id); if(p.category === 'deck_reg') return openDeckEditor(id);
        editId = id; catIn.value = p.category; catIn.dispatchEvent(new Event('change'));
        titIn.value = p.title; mainIn.checked = p.isMain;
        if(p.subCategory) subCatIn.value = p.subCategory;
        if(p.category === 'hero_reg') gradeIn.value = p.grade;
        if(p.links && p.links[0] && p.category.includes('video')) linkIn.value = p.links[0];
        document.getElementById('admin').style.display = 'block';
        window.scrollTo(0,0);
    };

    const deleteItem = async (id) => { if(confirm("삭제?")) { db.posts = db.posts.filter(p => p.id !== id); await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) }); render(); } };
    const goTab = (f, b) => { curFilter = f; curSub = '전체'; document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); };
    const goSub = (s) => { curSub = s; render(); };
    const handleSearch = (e) => { keyword = e.target.value; render(); };
    const closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
    const closeModalOnBg = (e, id) => { if(e.target.id === id) closeModal(id); };
    const resetAdmin = () => { editId = null; admin.style.display = 'none'; titIn.value = ''; };
    const closeDeckEditor = () => { if(confirm("취소?")) document.getElementById('deckEditor').style.display = 'none'; };

    catIn.onchange = (e) => {
        const v = e.target.value;
        heroGradeSet.style.display = v === 'hero_reg' ? 'block' : 'none';
        subCatUI.style.display = v.includes('video') ? 'block' : 'none';
        if(v === 'video_pve') subCatIn.innerHTML = '<option value="레이드">레이드</option><option value="공성전">공성전</option><option value="강림">강림</option><option value="무한의탑">무한의탑</option>';
        else if(v === 'video_pvp') subCatIn.innerHTML = '<option value="결투장">결투장</option><option value="실시간 결투장">실시간 결투장</option>';
        linkIn.style.display = v.includes('video') ? 'block' : 'none';
        fileIn.style.display = v.includes('video') ? 'none' : 'block';
    };
</script>
</body>
</html>
