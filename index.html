<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>길드 영상 게시판</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
  cursor:pointer;
}

.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

iframe{
  width:100%;
  height:200px;
}

.admin-panel{
  display:none;
  text-align:center;
  padding:20px;
  background:white;
}

input{
  padding:8px;
  margin:5px;
}

button{
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<header id="banner">
<h1>🎥 길드 영상방</h1>
<p>(배너 클릭)</p>
</header>

<!-- 관리자 패널 -->
<div class="admin-panel" id="adminPanel">
  <h3>관리자 모드</h3>
  <input id="title" placeholder="제목">
  <input id="url" placeholder="유튜브 링크">
  <button onclick="addVideo()">영상 추가</button>
</div>

<!-- 영상 목록 -->
<div class="video-grid" id="videoList"></div>


<script>
/* =========================
   관리자 설정
========================= */

const ADMIN_PASSWORD = "1234"; // ← 여기 비밀번호 변경

let adminMode = false;
let clickCount = 0;


/* =========================
   관리자 진입 (배너 여러번 클릭)
========================= */

document.getElementById("banner").addEventListener("click", () => {

  clickCount++;

  if(clickCount >= 5){
    clickCount = 0;

    const input = prompt("관리자 비밀번호 입력");

    if(input === ADMIN_PASSWORD){
      adminMode = true;
      document.getElementById("adminPanel").style.display="block";
      alert("관리자 모드 활성화");
    }else{
      alert("비밀번호 틀림");
    }
  }
});


/* =========================
   데이터 저장
========================= */

let videos = JSON.parse(localStorage.getItem("videos")) || [];

function save(){
  localStorage.setItem("videos", JSON.stringify(videos));
}


/* =========================
   유튜브 ID 추출
========================= */

function getYoutubeID(url){
  const reg =
  /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;

  const match = url.match(reg);
  return match ? match[1] : null;
}


/* =========================
   영상 추가 (관리자만)
========================= */

function addVideo(){

  if(!adminMode){
    alert("관리자만 가능합니다.");
    return;
  }

  const title=document.getElementById("title").value;
  const url=document.getElementById("url").value;

  const id=getYoutubeID(url);

  if(!title || !id){
    alert("입력 확인");
    return;
  }

  videos.push({title,id});
  save();
  render();
}


/* =========================
   삭제 (관리자만)
========================= */

function deleteVideo(index){

  if(!adminMode){
    alert("관리자만 삭제 가능");
    return;
  }

  videos.splice(index,1);
  save();
  render();
}


/* =========================
   화면 출력
========================= */

function render(){

  const list=document.getElementById("videoList");
  list.innerHTML="";

  videos.forEach((v,i)=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${v.title}</h3>
      <iframe src="https://www.youtube.com/embed/${v.id}"
      allowfullscreen></iframe>

      ${adminMode ?
      `<button onclick="deleteVideo(${i})">삭제</button>`
      : ``}
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
