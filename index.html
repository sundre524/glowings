<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowingS ARCHIVE</title>
    <style>
        :root { --gold: #d4af37; --red: #ff4444; --blue: #44aaff; --purple: #ff00ff; --bg: #0a0e14; --card: #1c2b3e; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color: var(--text); height: 100vh; overflow: hidden; font-size: 15px; line-height: 1.5; }
        
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .gate-box { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; width: 88%; max-width: 350px; background: #161c24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #main { display: none; flex-direction: column; height: 100vh; }
        header { background: #161c24; padding: 18px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; cursor: pointer; }
        header h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
        
        .search-container { background: #161c24; padding: 12px 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 16px; outline: none; }

        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }

        .sticky-tabs { position: sticky; top: -15px; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tabs { display: flex; justify-content: center; gap: 6px; }
        .tab-btn { background: #1c2b3e; color: #888; border: none; padding: 12px 5px; border-radius: 8px; font-size: 13px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        
        .sub-tabs { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sub-btn { flex-shrink: 0; padding: 10px 16px; font-size: 13px; background: #0a0e14; color: #888; border: 1px solid #333; border-radius: 6px; white-space: nowrap; }
        .sub-btn.active-off { border-color: var(--red); color: var(--red); background: rgba(255, 68, 68, 0.1); }
        .sub-btn.active-def { border-color: var(--blue); color: var(--blue); background: rgba(68, 170, 255, 0.1); }
        .sub-btn.active-hero { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d343e; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .card-header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid #333; }
        .card-title { font-size: 14px; color: var(--gold); font-weight: bold; }

        .deck-heroes-preview { display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); }
        .deck-preview-text { padding: 10px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #333; }

        .modal-content-box { background: #161c24; width: 95%; max-width: 500px; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; position: relative; max-height: 90vh; display: flex; flex-direction: column; }
        .deck-heroes-row { display: flex; justify-content: center; gap: 15px; padding: 25px 10px; background: linear-gradient(to bottom, rgba(212, 175, 55, 0.1), transparent); }
        .deck-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; overflow-y: auto; }
        .deck-info-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 12px; padding: 14px; }
        .deck-info-box.full { grid-column: span 2; }
        .info-label { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; }
        .info-value { color: #fff; font-size: 14px; line-height: 1.6; word-break: keep-all; white-space: pre-wrap; }

        #admin, #deckEditor { display: none; background: #161c24; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        
        #deckEditor { position: fixed; inset: 0; z-index: 11000; background: var(--bg); border: none; border-radius: 0; overflow-y: auto; height: 100vh; display: none; flex-direction: column; }
        .editor-header { background: #161c24; border-bottom: 1px solid var(--gold); padding: 18px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .editor-content { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 50px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 15px; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; }
        .hero-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #444; object-fit: cover; }
        .hero-name { font-size: 12px; margin-top: 8px; color: #fff; text-align: center; }

        .admin-edit-bar { display: flex; border-top: 1px solid #444; background: #000; }
        .edit-btn, .del-btn { padding: 14px; font-size: 14px; flex: 1; border: none; cursor: pointer; font-weight: bold; }
        .edit-btn { background: #1c2b3e; color: #66b2ff; }
        .del-btn { background: #421010; color: #ff8888; border-left: 1px solid #333; }
        
        .close-circle { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); width: 34px; height: 34px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

<div id="gatekeeper"><div class="gate-box"><h2 style="color:var(--gold); margin-bottom:20px;">🛡️ GlowingS</h2><input type="password" id="pw" placeholder="ACCESS CODE" style="width:100%; padding:15px; border-radius:10px; margin-bottom:15px; border:none; text-align:center; font-size:18px; background:#000; color:var(--gold);"><button class="btn-gold" onclick="checkGate()">ACCESS ENTER</button></div></div>

<div id="deckEditor">
    <div class="editor-header"><h2 style="color:var(--gold);">⚔️ 전략 덱 상세 설정</h2></div>
    <div class="editor-content">
        <label class="info-label">덱 제목</label>
        <input type="text" id="edTit" placeholder="예: 방덱 뚫기용 공덱">
        
        <label class="info-label">덱 종류</label>
        <select id="edType"><option value="offense">⚔️ 공격 덱</option><option value="defense">🛡️ 방어 덱</option></select>
        
        <label class="info-label">영웅 배치</label>
        <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #333;">
            <input type="text" placeholder="영웅1 검색..." onkeyup="filterHeroSelect(this, 'edP1')"><select id="edP1"></select>
            <input type="text" placeholder="영웅2 검색..." onkeyup="filterHeroSelect(this, 'edP2')"><select id="edP2"></select>
            <input type="text" placeholder="영웅3 검색..." onkeyup="filterHeroSelect(this, 'edP3')"><select id="edP3"></select>
        </div>
        
        <label class="info-label">상세 정보 입력</label>
        <div style="background:rgba(212,175,55,0.05); padding:15px; border-radius:12px; border:1px solid #444;">
            <input type="text" id="edSpeed" placeholder="속공 (예: 512)">
            <input type="text" id="edRing" placeholder="반지 (예: 불사/권능)">
            <input type="text" id="edPet" placeholder="펫 (예: 라이언 4성)">
            <input type="text" id="edSkill" placeholder="스킬 순서 (예: 1-3-2)">
            <input type="text" id="edForm" placeholder="진형 (예: 속공 진형 10렙)">
            <textarea id="edExtra" style="height: 120px;" placeholder="장비 세팅 및 기타 특이사항"></textarea>
        </div>
        
        <button class="btn-gold" id="edSaveBtn" onclick="saveDeckEdit()">✅ 수정 완료 및 저장</button>
        <button class="btn-gold" onclick="closeDeckEditor()" style="background:#333; color:#fff; margin-top:10px;">취소</button>
    </div>
</div>

<div id="main">
    <header onclick="askAdmin()"><h1>🛡️ GlowingS ARCHIVE</h1></header>
    <div class="search-container"><input type="text" id="mainSearch" class="search-box" placeholder="공략, 영웅, 덱 검색..." onkeyup="handleSearch(event)"></div>

    <div class="content-scroll">
        <div class="container">
            <div id="admin">
                <div id="adminTitle" style="color:var(--gold); font-weight:bold; margin-bottom:15px; font-size:1.1rem;">📤 자료 등록</div>
                <select id="catIn">
                    <option value="photo">📸 사진첩</option>
                    <option value="hero_reg">👤 영웅 등록</option>
                    <option value="video_pve">🎥 PVE 공략</option>
                    <option value="video_pvp">🎥 PVP 공략</option>
                    <option value="deck_reg">⚔️ 전략 덱 등록</option>
                </select>
                <div id="deckUI" style="display:none; padding:10px; background:rgba(0,0,0,0.2); border-radius:10px; margin-bottom:12px;">
                    <p style="font-size:13px; color:var(--gold);">* 덱 제목만 적고 등록한 뒤, 리스트에서 '수정'을 눌러 상세 항목을 채워주세요!</p>
                </div>
                <div id="heroGradeSet" style="display:none;"><select id="gradeIn"><option value="old">🟣 구세나</option><option value="leg">🟡 전설</option><option value="rare">🔵 희귀</option></select></div>
                <input type="text" id="titIn" placeholder="제목을 입력하세요">
                <div id="fileArea"><input type="file" id="fileIn" multiple accept="image/*" style="border:none; padding:10px 0;"></div>
                <button class="btn-gold" id="upBtn" onclick="doUpload()">💾 데이터 저장하기</button>
            </div>

            <div class="sticky-tabs">
                <div class="tabs">
                    <button class="tab-btn active" onclick="goTab('all', this)">홈</button>
                    <button class="tab-btn" onclick="goTab('photo', this)">사진</button>
                    <button class="tab-btn" onclick="goTab('video_pve', this)">PVE</button>
                    <button class="tab-btn" onclick="goTab('video_pvp', this)">PVP</button>
                    <button class="tab-btn" style="border:1px solid var(--gold); color:var(--gold);" onclick="goTab('guild', this)">길드전</button>
                </div>
                <div id="subTabArea" style="display:none;"><div class="sub-tabs" id="subTabList"></div></div>
            </div>

            <div id="list" class="grid"></div>
            <div id="decks" class="grid" style="display:none;"></div>
            <div id="heroes" style="display:none;"></div>
        </div>
    </div>
</div>

<div id="deckModal" class="modal" onclick="closeModalOnBg(event, 'deckModal')">
    <div class="modal-content-box">
        <div class="close-circle" onclick="closeModal('deckModal')">&times;</div>
        <div id="deckModalTitle" style="padding:20px; text-align:center; color:var(--gold); font-weight:bold; border-bottom:1px solid #333;"></div>
        <div id="deckModalHeroes"></div>
        <div id="deckModalDetails" class="deck-detail-grid"></div>
        <div id="deckModalAdmin" style="display:none;"></div>
    </div>
</div>

<div id="heroModal" class="modal" onclick="closeModalOnBg(event, 'heroModal')">
    <div class="gate-box" style="max-width:400px; width:92%;">
        <div class="close-circle" onclick="closeModal('heroModal')">&times;</div>
        <img id="mHeroImg" class="hero-img" style="width:90px; height:90px; margin-bottom:10px;">
        <h3 id="mHeroName" style="color:var(--gold);"></h3>
        <div id="mUsage" style="max-height:280px; overflow-y:auto; text-align:left; margin-top:15px; border-top:1px solid #333; padding-top:10px;"></div>
    </div>
</div>

<script>
    const CONFIG = {
        API: "https://api.jsonbin.io/v3/b/69ae6f09d0ea881f40ff0f44",
        KEY: "$2a$10$hcOVgg3LvdoRgRZdayPtVOA3gbxyOY7UibDbi/jcJnMlPiok/xlcO",
        CLOUD: "djef3ylqf", PRESET: "guild_preset"
    };

    let db = { posts: [] };
    let isAdmin = false, curFilter = 'all', curSub = '전체', keyword = "", editId = null;

    window.onload = () => {
        if(sessionStorage.getItem('auth') === 'true') {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            isAdmin = sessionStorage.getItem('admin') === 'true';
            if(isAdmin) document.getElementById('admin').style.display = 'block';
            fetchData();
        }
    };

    const checkGate = () => { if(document.getElementById('pw').value === 'glowing99') { sessionStorage.setItem('auth', 'true'); location.reload(); } };
    const askAdmin = () => { if(!isAdmin && prompt("ADMIN CODE:") === '1005') { sessionStorage.setItem('admin', 'true'); location.reload(); } };
    
    const fetchData = async () => {
        try {
            const res = await fetch(`${CONFIG.API}/latest`, { headers: { "X-Master-Key": CONFIG.KEY, "X-Bin-Meta": "false" }, cache: 'no-store' });
            const data = await res.json();
            db.posts = data.posts || [];
            updateSelectors(); render();
        } catch(e) { console.error(e); }
    };

    const updateSelectors = () => {
        const heroes = db.posts.filter(p => p.category === 'hero_reg').sort((a,b) => a.title.localeCompare(b.title));
        ['edP1', 'edP2', 'edP3'].forEach(id => {
            const el = document.getElementById(id); if(!el) return;
            let h = '<option value="">선택 안함</option>';
            heroes.forEach(x => h += `<option value="${x.title}">${x.title}</option>`);
            el.innerHTML = h;
        });
    };

    const filterHeroSelect = (input, target) => {
        const val = input.value;
        const opts = document.getElementById(target).options;
        for(let i=0; i<opts.length; i++) { opts[i].style.display = opts[i].text.includes(val) ? "block" : "none"; }
    };

    const render = () => {
        const listEl = document.getElementById('list'), decksEl = document.getElementById('decks'), heroesEl = document.getElementById('heroes');
        listEl.innerHTML = ''; decksEl.innerHTML = ''; heroesEl.innerHTML = '';
        listEl.style.display = 'none'; decksEl.style.display = 'none'; heroesEl.style.display = 'none';
        document.getElementById('subTabArea').style.display = curFilter === 'guild' ? 'block' : 'none';

        if(curFilter === 'guild') {
            document.getElementById('subTabList').innerHTML = `
                <button class="sub-btn ${curSub==='offense'?'active-off':''}" onclick="goSub('offense')">⚔️ 공격 덱</button>
                <button class="sub-btn ${curSub==='defense'?'active-def':''}" onclick="goSub('defense')">🛡️ 방어 덱</button>
                <button class="sub-btn ${curSub==='hero'?'active-hero':''}" onclick="goSub('hero')">👤 영웅 도감</button>`;
        }

        let filtered = db.posts.filter(p => {
            if(keyword && !(p.title||"").includes(keyword)) return false;
            if(curFilter === 'all') return p.isMain === true;
            if(curFilter === 'guild') {
                if(curSub === 'hero') return p.category === 'hero_reg';
                return p.category === 'deck_reg' && p.deckType === curSub;
            }
            return p.category === curFilter;
        });

        if(curFilter === 'guild' && curSub === 'hero') {
            heroesEl.style.display = 'block';
            const grid = document.createElement('div'); grid.className = 'hero-grid';
            filtered.forEach(h => {
                const unit = document.createElement('div'); unit.className = 'hero-unit';
                unit.innerHTML = `<img src="${h.img}" class="hero-img" loading="lazy"><div class="hero-name">${h.title}</div>`;
                unit.onclick = () => showHeroDetail(h); grid.appendChild(unit);
            });
            heroesEl.appendChild(grid);
        } else if(curFilter === 'guild') {
            decksEl.style.display = 'grid'; [...filtered].reverse().forEach(p => decksEl.appendChild(createDeckPreviewCard(p)));
        } else {
            listEl.style.display = 'grid'; [...filtered].reverse().forEach(p => listEl.appendChild(createMediaCard(p)));
        }
    };

    const createMediaCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        const thumb = (p.links && p.links[0]) ? p.links[0] : "https://via.placeholder.com/400x225/1c2b3e/gold?text=GlowingS";
        div.innerHTML = `<img src="${thumb}" style="width:100%; aspect-ratio:16/9; object-fit:cover;" loading="lazy"><div class="card-header"><div class="card-title">${p.title}</div></div>`;
        if(isAdmin) div.appendChild(createAdminBar(p.id)); return div;
    };

    const createDeckPreviewCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        div.onclick = () => showDeckDetail(p);
        const hMap = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hMap[h.title] = h);
        let hHtml = '<div class="deck-heroes-preview">';
        (p.picks || []).forEach(n => { if(hMap[n]) hHtml += `<img src="${hMap[n].img}" style="width:40px; height:40px; border-radius:50%; border:1px solid var(--gold); object-fit:cover;">`; });
        hHtml += '</div>';
        div.innerHTML = `<div class="card-header"><div class="card-title">${p.title || '전략 덱'}</div></div>${hHtml}<div class="deck-preview-text">상세 보기</div>`;
        return div;
    };

    const showDeckDetail = (p) => {
        const hMap = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hMap[h.title] = h);
        deckModalTitle.innerText = p.title;
        let hHtml = '<div class="deck-heroes-row">';
        (p.picks || []).forEach(n => { if(hMap[n]) hHtml += `<div style="text-align:center;"><img src="${hMap[n].img}" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); object-fit:cover;"><div style="font-size:11px; margin-top:8px; color:#fff;">${n}</div></div>`; });
        hHtml += '</div>';
        deckModalHeroes.innerHTML = hHtml;

        // 항목별 출력 로직
        const items = [
            { label: '⚡ 속공', value: p.speed },
            { label: '💍 반지', value: p.ring },
            { label: '🐾 펫', value: p.pet },
            { label: '📜 스킬 순서', value: p.skill },
            { label: '🛡️ 진형', value: p.form },
            { label: '📝 장비 및 특이사항', value: p.extra, full: true }
        ];

        let infoHtml = '';
        items.forEach(item => {
            if(item.value) {
                infoHtml += `<div class="deck-info-box ${item.full?'full':''}">
                    <span class="info-label">${item.label}</span>
                    <div class="info-value">${item.value}</div>
                </div>`;
            }
        });

        deckModalDetails.innerHTML = infoHtml || '<p style="grid-column:span 2; text-align:center; color:#555; padding:20px;">정보가 없습니다.</p>';
        if(isAdmin) {
            deckModalAdmin.style.display = 'block';
            deckModalAdmin.innerHTML = createAdminBar(p.id, 'deck').outerHTML;
        } else { deckModalAdmin.style.display = 'none'; }
        document.getElementById('deckModal').style.display = 'flex';
    };

    const showHeroDetail = (h) => {
        mHeroImg.src = h.img; mHeroName.innerText = h.title;
        const usage = db.posts.filter(p => p.category === 'deck_reg' && (p.picks||[]).includes(h.title));
        let uHtml = '<p style="font-size:13px; color:var(--gold); margin-bottom:10px; font-weight:bold;">💡 활용 중인 조합</p>';
        usage.forEach(u => uHtml += `<div style="background:#000; padding:12px; border-radius:8px; margin-bottom:8px; font-size:13px; border-left:3px solid var(--gold);" onclick="closeModal('heroModal'); showDeckDetail(${JSON.stringify(u).replace(/"/g, '&quot;')})">${u.title}</div>`);
        mUsage.innerHTML = usage.length > 0 ? uHtml : '<p style="text-align:center; color:#555; padding:20px;">조합 정보가 없습니다.</p>';
        if(isAdmin) mUsage.innerHTML += createAdminBar(h.id).outerHTML;
        document.getElementById('heroModal').style.display = 'flex';
    };

    window.openDeckEditor = (id) => {
        const p = db.posts.find(x => x.id === id);
        if(!p) return;
        editId = id;
        edTit.value = p.title || '';
        edType.value = p.deckType || 'offense';
        edP1.value = p.picks?.[0] || '';
        edP2.value = p.picks?.[1] || '';
        edP3.value = p.picks?.[2] || '';
        edSpeed.value = p.speed || '';
        edRing.value = p.ring || '';
        edPet.value = p.pet || '';
        edSkill.value = p.skill || '';
        edForm.value = p.form || '';
        edExtra.value = p.extra || '';
        
        document.getElementById('deckEditor').style.display = 'flex';
        closeModal('deckModal');
    };

    const closeDeckEditor = () => { editId = null; document.getElementById('deckEditor').style.display = 'none'; };

    const saveDeckEdit = async () => {
        const btn = document.getElementById('edSaveBtn');
        if(!edTit.value) return alert("제목을 입력해주세요.");
        btn.innerText = "저장 중..."; btn.disabled = true;

        let t = db.posts.find(x => x.id === editId);
        t.title = edTit.value;
        t.deckType = edType.value;
        t.picks = [edP1.value, edP2.value, edP3.value].filter(x => x);
        t.speed = edSpeed.value;
        t.ring = edRing.value;
        t.pet = edPet.value;
        t.skill = edSkill.value;
        t.form = edForm.value;
        t.extra = edExtra.value;

        await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) });
        location.reload();
    };

    window.startEdit = (id) => {
        const p = db.posts.find(x => x.id === id);
        if(p.category === 'deck_reg') return openDeckEditor(id);
        editId = id;
        catIn.value = p.category;
        catIn.dispatchEvent(new Event('change'));
        titIn.value = p.title || '';
        if(p.category === 'hero_reg') gradeIn.value = p.grade || 'leg';
        adminTitle.innerText = "🛠️ 데이터 수정 모드";
        document.getElementById('admin').style.display = 'block';
        closeModal('deckModal'); closeModal('heroModal');
        document.querySelector('.content-scroll').scrollTo(0,0);
    };

    const doUpload = async () => {
        const btn = document.getElementById('upBtn'); 
        if(!titIn.value) return alert("제목을 입력해주세요.");
        btn.innerText = "저장 중..."; btn.disabled = true;

        let t = editId ? db.posts.find(x => x.id === editId) : { id: Date.now() };
        t.category = catIn.value; t.title = titIn.value; t.isMain = true;
        if(t.category === 'hero_reg') t.grade = gradeIn.value;
        if(t.category === 'deck_reg') { t.deckType = 'offense'; }
        
        if(fileIn.files.length > 0) {
            const fd = new FormData(); fd.append('file', fileIn.files[0]); fd.append('upload_preset', CONFIG.PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD}/image/upload`, { method: 'POST', body: fd });
            const d = await res.json();
            if(t.category === 'hero_reg') t.img = d.secure_url; else t.links = [d.secure_url];
        }
        
        if(!editId) db.posts.push(t);
        await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) });
        location.reload();
    };

    const deleteItem = async (id) => { if(confirm("정말로 삭제하시겠습니까?")) { db.posts = db.posts.filter(p => p.id !== id); await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) }); render(); closeModal('deckModal'); closeModal('heroModal'); } };
    
    const createAdminBar = (id, type) => {
        const bar = document.createElement('div'); bar.className = 'admin-edit-bar';
        const editFunc = type === 'deck' ? `openDeckEditor(${id})` : `startEdit(${id})`;
        bar.innerHTML = `<button class="edit-btn" onclick="${editFunc}">수정</button><button class="del-btn" onclick="deleteItem(${id})">삭제</button>`;
        return bar;
    };

    const goTab = (f, b) => { curFilter = f; curSub = f === 'guild' ? 'offense' : '전체'; document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); };
    const goSub = (s) => { curSub = s; render(); };
    const handleSearch = (e) => { keyword = e.target.value; render(); };
    const closeModal = (id) => document.getElementById(id).style.display = 'none';
    const closeModalOnBg = (e, id) => { if(e.target.id === id) closeModal(id); };
    const resetAdmin = () => { editId = null; adminTitle.innerText = "📤 자료 등록"; titIn.value = ''; fileIn.value=''; };

    catIn.onchange = (e) => {
        deckUI.style.display = e.target.value === 'deck_reg' ? 'block' : 'none';
        heroGradeSet.style.display = e.target.value === 'hero_reg' ? 'block' : 'none';
        fileArea.style.display = e.target.value === 'deck_reg' ? 'none' : 'block';
    };
</script>
</body>
</html>
