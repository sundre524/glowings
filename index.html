<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowingS ARCHIVE</title>
    <style>
        :root { --gold: #d4af37; --red: #ff4444; --blue: #44aaff; --purple: #b044ff; --bg: #0a0e14; --card: #1c2b3e; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color: var(--text); height: 100vh; overflow: hidden; font-size: 15px; line-height: 1.5; }
        
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .gate-box { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; width: 88%; max-width: 350px; background: #161c24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #main { display: none; flex-direction: column; height: 100vh; }
        header { background: #161c24; padding: 18px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; cursor: pointer; }
        header h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
        
        .search-container { background: #161c24; padding: 12px 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 16px; outline: none; }
        
        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
        
        .sticky-tabs { position: sticky; top: -15px; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tabs { display: flex; justify-content: center; gap: 6px; }
        .tab-btn { background: #1c2b3e; color: #888; border: none; padding: 12px 5px; border-radius: 8px; font-size: 13px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        
        .sub-tabs { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sub-btn { flex-shrink: 0; padding: 10px 16px; font-size: 13px; background: #0a0e14; color: #888; border: 1px solid #333; border-radius: 6px; white-space: nowrap; font-weight: bold; }
        .sub-btn.active-sub { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: stretch; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d343e; display: flex; flex-direction: column; position: relative; height: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; }
        .card-header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid #333; }
        .card-title { font-size: 14px; color: var(--gold); font-weight: bold; }
        .card-img-area { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #000; position: relative; }
        .card-img-area img { width: 100%; height: 100%; object-fit: cover; }
        
        .deck-heroes-preview { flex-grow: 1; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 25px 15px; background: rgba(0,0,0,0.15); }
        .deck-preview-text { padding: 12px; font-size: 12px; color: #aaa; text-align: center; border-top: 1px solid #333; background: rgba(0,0,0,0.2); }

        /* [추가] 슬라이더 및 PC 버튼 스타일 */
        .slider-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .slider-content { display: flex; overflow-x: auto; snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; width: 100%; }
        .slider-content::-webkit-scrollbar { display: none; }
        .slide-item { flex: 0 0 100%; snap-align: start; display: flex; justify-content: center; align-items: center; }
        .slide-item img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); color: #fff; border: none; width: 40px; height: 60px; font-size: 24px; cursor: pointer; z-index: 120; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(212, 175, 55, 0.5); }
        .nav-prev { left: 0; border-radius: 0 10px 10px 0; }
        .nav-next { right: 0; border-radius: 10px 0 0 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content-box { background: #161c24; width: 95%; max-width: 500px; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; position: relative; max-height: 90vh; display: flex; flex-direction: column; }
        .close-circle { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); width: 34px; height: 34px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 150; }

        /* 전략덱 상세 레이아웃 */
        .deck-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; overflow-y: auto; }
        .deck-info-box { background: rgba(0,0,0,0.4); border: 1px solid #333; padding: 12px; border-radius: 10px; }
        .info-label { color: var(--gold); font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; }
        .info-value { color: #fff; font-size: 13px; white-space: pre-wrap; }

        #admin { display: none; background: #161c24; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 25px; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; padding: 10px 0; }
        .hero-unit { text-align: center; cursor: pointer; }
        .hero-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #444; object-fit: cover; }
        .admin-edit-bar { display: flex; border-top: 1px solid #444; }
        .edit-btn, .del-btn { flex: 1; padding: 10px; font-size: 12px; border: none; cursor: pointer; font-weight: bold; }
        .edit-btn { background: #1c2b3e; color: #66b2ff; }
        .del-btn { background: #421010; color: #ff8888; }
    </style>
</head>
<body>

<div id="gatekeeper"><div class="gate-box"><h2>🛡️ ACCESS</h2><input type="password" id="pw" placeholder="코드 입력"><button class="btn-gold" onclick="checkGate()">진입</button></div></div>

<div id="main">
    <header onclick="askAdmin()"><h1>🛡️ GlowingS ARCHIVE</h1></header>
    <div class="search-container"><input type="text" id="mainSearch" class="search-box" placeholder="자료 검색..." onkeyup="handleSearch(event)"></div>
    <div class="content-scroll">
        <div class="container">
            <div id="admin">
                <h3 id="adminTitle" style="color:var(--gold); margin-bottom:10px;">📤 자료 등록</h3>
                <select id="catIn">
                    <option value="photo">📸 사진첩</option>
                    <option value="hero_reg">👤 영웅 등록</option>
                    <option value="deck_reg">⚔️ 전략 덱 등록</option>
                </select>
                <input type="text" id="titIn" placeholder="제목">
                <input type="file" id="fileIn" multiple>
                <button class="btn-gold" id="upBtn" onclick="doUpload()">저장</button>
                <button class="btn-gold" onclick="resetAdmin()" style="background:#333; color:#fff; margin-top:5px;">취소</button>
            </div>

            <div class="sticky-tabs">
                <div class="tabs">
                    <button class="tab-btn active" onclick="goTab('all', this)">홈</button>
                    <button class="tab-btn" onclick="goTab('photo', this)">사진</button>
                    <button class="tab-btn" onclick="goTab('guild', this)">길드전</button>
                </div>
                <div id="subTabArea" style="display:none;"><div class="sub-tabs" id="subTabList"></div></div>
            </div>

            <div id="list" class="grid"></div>
            <div id="decks" class="grid" style="display:none;"></div>
            <div id="heroes" style="display:none;"></div>
        </div>
    </div>
</div>

<div id="mediaModal" class="modal" onclick="closeModalOnBg(event, 'mediaModal')">
    <div class="close-circle" onclick="closeModal('mediaModal')">&times;</div>
    <div class="modal-content-box" style="background:transparent; border:none; width:100%; max-width:900px;">
        <div id="mediaContainer"></div>
        <div id="dotsArea" style="display:flex; justify-content:center; gap:8px; padding:15px;"></div>
    </div>
</div>

<div id="deckModal" class="modal" onclick="closeModalOnBg(event, 'deckModal')">
    <div class="modal-content-box">
        <div class="close-circle" onclick="closeModal('deckModal')">&times;</div>
        <div id="deckModalTitle" style="padding:20px; text-align:center; color:var(--gold); font-weight:bold; border-bottom:1px solid #333;"></div>
        <div id="deckModalHeroes" style="display:flex; justify-content:center; gap:10px; padding:20px; background:rgba(0,0,0,0.2);"></div>
        <div id="deckModalDetails" class="deck-detail-grid"></div>
    </div>
</div>

<script>
    const CONFIG = { API: "https://api.jsonbin.io/v3/b/69ae6f09d0ea881f40ff0f44", KEY: "$2a$10$hcOVgg3LvdoRgRZdayPtVOA3gbxyOY7UibDbi/jcJnMlPiok/xlcO", CLOUD: "djef3ylqf", PRESET: "guild_preset" };
    let db = { posts: [] }, isAdmin = false, curFilter = 'all', curSub = '전체', keyword = "";

    window.onload = () => {
        if(sessionStorage.getItem('auth') === 'true') {
            document.getElementById('gatekeeper').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            isAdmin = sessionStorage.getItem('admin') === 'true';
            if(isAdmin) document.getElementById('admin').style.display = 'block';
            fetchData();
        }
    };

    const checkGate = () => { if(document.getElementById('pw').value === 'glowing99') { sessionStorage.setItem('auth', 'true'); location.reload(); } };
    const askAdmin = () => { if(!isAdmin && prompt("ADMIN CODE:") === '1005') { sessionStorage.setItem('admin', 'true'); location.reload(); } };

    const fetchData = async () => {
        try {
            const res = await fetch(`${CONFIG.API}/latest`, { headers: { "X-Master-Key": CONFIG.KEY, "X-Bin-Meta": "false" }, cache: 'no-store' });
            const data = await res.json(); db.posts = data.posts || []; render();
        } catch(e) { console.error(e); }
    };

    const render = () => {
        const listEl = document.getElementById('list'), decksEl = document.getElementById('decks'), heroesEl = document.getElementById('heroes');
        listEl.innerHTML = ''; decksEl.innerHTML = ''; heroesEl.innerHTML = '';
        listEl.style.display = 'none'; decksEl.style.display = 'none'; heroesEl.style.display = 'none';
        
        if(curFilter === 'guild') {
            document.getElementById('subTabArea').style.display = 'block';
            document.getElementById('subTabList').innerHTML = `<button class="sub-btn ${curSub==='전체'?'active-sub':''}" onclick="goSub('전체')">전체</button><button class="sub-btn ${curSub==='hero'?'active-sub':''}" onclick="goSub('hero')">영웅 도감</button>`;
        } else {
            document.getElementById('subTabArea').style.display = 'none';
        }

        let filtered = db.posts.filter(p => {
            if(keyword && !(p.title||"").toLowerCase().includes(keyword.toLowerCase())) return false;
            if(curFilter === 'all') return p.isMain === true;
            if(curFilter === 'guild') {
                if(curSub === 'hero') return p.category === 'hero_reg';
                return p.category === 'deck_reg';
            }
            return p.category === curFilter;
        });

        filtered.reverse().forEach(p => {
            if(p.category === 'deck_reg') decksEl.appendChild(createDeckCard(p));
            else if(p.category === 'hero_reg' && curSub === 'hero') {
                const u = document.createElement('div'); u.className = 'hero-unit';
                u.innerHTML = `<img src="${p.img}" class="hero-img"><div style="font-size:11px; margin-top:5px;">${p.title}</div>`;
                heroesEl.appendChild(u);
            } else listEl.appendChild(createMediaCard(p));
        });

        if(curFilter === 'guild') {
            if(curSub === 'hero') { heroesEl.style.display = 'grid'; heroesEl.className = 'hero-grid'; }
            else decksEl.style.display = 'grid';
        } else listEl.style.display = 'grid';
    };

    const createMediaCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        const thumb = p.links?.[0] || p.img;
        div.innerHTML = `<div class="card-img-area"><img src="${thumb}"></div><div class="card-header"><div class="card-title">${p.title}</div></div>`;
        div.onclick = (e) => { if(!e.target.closest('.admin-edit-bar')) openMedia(p); };
        if(isAdmin) div.appendChild(createAdminBar(p.id));
        return div;
    };

    const createDeckCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        const hm = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hm[h.title] = h);
        let hHtml = '';
        (p.picks || []).forEach(n => { if(hm[n]) hHtml += `<img src="${hm[n].img}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--gold);">`; });

        div.innerHTML = `
            <div class="card-header"><div class="card-title">${p.title}</div></div>
            <div class="deck-heroes-preview">${hHtml || '<span style="color:#555">영웅 정보 없음</span>'}</div>
            <div class="deck-preview-text">상세 보기</div>
        `;
        div.onclick = (e) => { if(!e.target.closest('.admin-edit-bar')) showDeckDetail(p); };
        if(isAdmin) div.appendChild(createAdminBar(p.id));
        return div;
    };

    const showDeckDetail = (p) => {
        document.getElementById('deckModalTitle').innerText = p.title;
        const hm = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hm[h.title] = h);
        let hHtml = '';
        (p.picks || []).forEach(n => { if(hm[n]) hHtml += `<div style="text-align:center;"><img src="${hm[n].img}" style="width:50px; height:50px; border-radius:50%; border:2px solid var(--gold);"><div style="font-size:10px; color:#fff; margin-top:5px;">${n}</div></div>`; });
        document.getElementById('deckModalHeroes').innerHTML = hHtml;

        const info = [
            {l:'⚡ 속공', v:p.speed}, {l:'💍 반지', v:p.ring}, {l:'🐾 펫', v:p.pet}, 
            {l:'📜 스킬', v:p.skill}, {l:'🛡️ 진형', v:p.form}, {l:'📝 메모', v:p.extra}
        ];
        let dHtml = '';
        info.forEach(i => { if(i.v) dHtml += `<div class="deck-info-box"><span class="info-label">${i.l}</span><div class="info-value">${i.v}</div></div>`; });
        document.getElementById('deckModalDetails').innerHTML = dHtml || '<p style="grid-column:span 2; text-align:center; padding:20px; color:#555;">상세 정보가 없습니다.</p>';
        document.getElementById('deckModal').style.display = 'flex';
    };

    const openMedia = (p) => {
        const container = document.getElementById('mediaContainer');
        const dotsArea = document.getElementById('dotsArea');
        container.innerHTML = ''; dotsArea.innerHTML = '';

        const wrapper = document.createElement('div'); wrapper.className = 'slider-wrapper';
        const slider = document.createElement('div'); slider.className = 'slider-content';
        
        // 좌우 버튼 생성
        if(p.links && p.links.length > 1) {
            const btnPrev = document.createElement('button'); btnPrev.className = 'nav-btn nav-prev'; btnPrev.innerHTML = '&#10094;';
            const btnNext = document.createElement('button'); btnNext.className = 'nav-btn nav-next'; btnNext.innerHTML = '&#10095;';
            btnPrev.onclick = () => slider.scrollBy({left: -slider.clientWidth, behavior: 'smooth'});
            btnNext.onclick = () => slider.scrollBy({left: slider.clientWidth, behavior: 'smooth'});
            wrapper.appendChild(btnPrev); wrapper.appendChild(btnNext);
        }

        p.links.forEach((url, i) => {
            const item = document.createElement('div'); item.className = 'slide-item';
            item.innerHTML = `<img src="${url}">`;
            slider.appendChild(item);
            const dot = document.createElement('div'); dot.style.cssText = "width:6px; height:6px; border-radius:50%; background:#444;";
            if(i===0) dot.style.background = "var(--gold)";
            dot.className = 'dot'; dotsArea.appendChild(dot);
        });

        slider.onscroll = () => {
            const idx = Math.round(slider.scrollLeft / slider.clientWidth);
            document.querySelectorAll('.dot').forEach((d, i) => d.style.background = i === idx ? "var(--gold)" : "#444");
        };

        wrapper.appendChild(slider); container.appendChild(wrapper);
        document.getElementById('mediaModal').style.display = 'flex';
    };

    const doUpload = async () => {
        const btn = document.getElementById('upBtn'); const files = document.getElementById('fileIn').files;
        btn.innerText = "처리 중..."; btn.disabled = true;
        try {
            let urls = [];
            for(let f of files) {
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', CONFIG.PRESET);
                const r = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD}/image/upload`, { method:'POST', body:fd });
                const d = await r.json(); urls.push(d.secure_url);
            }
            const newItem = { id: Date.now(), category: document.getElementById('catIn').value, title: document.getElementById('titIn').value, links: urls, isMain: true };
            if(newItem.category === 'hero_reg') newItem.img = urls[0];
            db.posts.push(newItem);
            await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) });
            location.reload();
        } catch(e) { alert("오류"); btn.disabled = false; }
    };

    const createAdminBar = (id) => {
        const div = document.createElement('div'); div.className = 'admin-edit-bar';
        div.innerHTML = `<button class="del-btn" onclick="deleteItem(${id})" style="width:100%;">삭제</button>`;
        return div;
    };
    const deleteItem = async (id) => { if(confirm("삭제?")) { db.posts = db.posts.filter(p => p.id !== id); await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) }); render(); } };
    const goTab = (f, b) => { curFilter = f; curSub = '전체'; document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); };
    const goSub = (s) => { curSub = s; render(); };
    const handleSearch = (e) => { keyword = e.target.value; render(); };
    const closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
    const closeModalOnBg = (e, id) => { if(e.target.id === id) closeModal(id); };
    const resetAdmin = () => { document.getElementById('admin').style.display = 'none'; };
</script>
</body>
</html>
