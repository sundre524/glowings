<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowingS ARCHIVE</title>
    <style>
        :root { --gold: #d4af37; --red: #ff4444; --blue: #44aaff; --purple: #b044ff; --bg: #0a0e14; --card: #1c2b3e; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color: var(--text); height: 100vh; overflow: hidden; font-size: 15px; line-height: 1.5; }
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .gate-box { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; width: 88%; max-width: 350px; background: #161c24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #main { display: none; flex-direction: column; height: 100vh; }
        header { background: #161c24; padding: 18px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; cursor: pointer; }
        header h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
        .search-container { background: #161c24; padding: 12px 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 16px; outline: none; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
        .sticky-tabs { position: sticky; top: -15px; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tabs { display: flex; justify-content: center; gap: 6px; }
        .tab-btn { background: #1c2b3e; color: #888; border: none; padding: 12px 5px; border-radius: 8px; font-size: 13px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        .sub-tabs { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sub-btn { flex-shrink: 0; padding: 10px 16px; font-size: 13px; background: #0a0e14; color: #888; border: 1px solid #333; border-radius: 6px; white-space: nowrap; font-weight: bold; }
        .sub-btn.active-sub { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #2d343e; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.98); }
        .card-header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid #333; }
        .card-title { font-size: 14px; color: var(--gold); font-weight: bold; }
        .deck-heroes-preview { display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); }
        .deck-preview-text { padding: 10px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #333; }

        .modal-content-box { background: #161c24; width: 95%; max-width: 500px; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; position: relative; max-height: 85vh; display: flex; flex-direction: column; }
        .deck-heroes-row { display: flex; justify-content: center; gap: 15px; padding: 25px 10px; background: linear-gradient(to bottom, rgba(212, 175, 55, 0.1), transparent); flex-shrink: 0; }
        .deck-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
        .deck-info-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 12px; padding: 14px; }
        .deck-info-box.full { grid-column: span 2; }
        .info-label { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; }
        .info-value { color: #fff; font-size: 14px; line-height: 1.6; word-break: break-all; white-space: pre-wrap; }

        #admin, #deckEditor { display: none; background: #161c24; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        #deckEditor { position: fixed; inset: 0; z-index: 11000; background: var(--bg); border: none; border-radius: 0; overflow-y: auto; height: 100vh; display: none; flex-direction: column; }
        .editor-header { background: #161c24; border-bottom: 1px solid var(--gold); padding: 18px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .editor-content { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 50px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 15px; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; }
        .hero-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #444; object-fit: cover; }
        .border-old { border-color: var(--purple) !important; }
        .border-leg { border-color: var(--gold) !important; }
        .border-rare { border-color: var(--blue) !important; }
        .hero-name { font-size: 12px; margin-top: 8px; color: #fff; text-align: center; }

        .admin-edit-bar { display: flex; border-top: 1px solid #444; background: #000; flex-shrink: 0; }
        .edit-btn, .del-btn { padding: 14px; font-size: 14px; flex: 1; border: none; cursor: pointer; font-weight: bold; }
        .edit-btn { background: #1c2b3e; color: #66b2ff; }
        .del-btn { background: #421010; color: #ff8888; border-left: 1px solid #333; }

        .close-circle { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); width: 34px; height: 34px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 10; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); font-size: 45px; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .check-container { display: flex; align-items: center; gap: 10px; margin: 10px 0 20px 5px; color: var(--gold); font-weight: bold; font-size: 15px; cursor: pointer; }
        .check-container input { width: 20px; height: 20px; margin: 0; cursor: pointer; }
    </style>
</head>
<body>

<div id="gatekeeper"><div class="gate-box"><h2 style="color:var(--gold); margin-bottom:20px;">🛡️ GlowingS</h2><input type="password" id="pw" placeholder="ACCESS CODE" style="width:100%; padding:15px; border-radius:10px; margin-bottom:15px; border:none; text-align:center; font-size:18px; background:#000; color:var(--gold);"><button class="btn-gold" onclick="checkGate()">ACCESS ENTER</button></div></div>

<div id="deckEditor">
    <div class="editor-header"><h2 style="color:var(--gold);">⚔️ 전략 덱 상세 설정</h2></div>
    <div class="editor-content">
        <label class="info-label">덱 제목</label><input type="text" id="edTit">
        <label class="info-label">덱 종류</label><select id="edType"><option value="offense">⚔️ 공격 덱</option><option value="defense">🛡️ 방어 덱</option></select>
        <label class="check-container"><input type="checkbox" id="edMain"> 메인 화면(홈)에 표시</label>
        <label class="info-label">영웅 배치</label>
        <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #333;">
            <div style="margin-bottom:10px;"><input type="text" placeholder="영웅1 검색..." onkeyup="filterHeroSelect(this, 'edP1')" style="margin-bottom:5px;"><select id="edP1"></select></div>
            <div style="margin-bottom:10px;"><input type="text" placeholder="영웅2 검색..." onkeyup="filterHeroSelect(this, 'edP2')" style="margin-bottom:5px;"><select id="edP2"></select></div>
            <div><input type="text" placeholder="영웅3 검색..." onkeyup="filterHeroSelect(this, 'edP3')" style="margin-bottom:5px;"><select id="edP3"></select></div>
        </div>
        <label class="info-label">세부 능력치 및 세팅</label>
        <div style="background:rgba(212,175,55,0.05); padding:15px; border-radius:12px; border:1px solid #444;">
            <label class="info-label">⚡ 속공</label><input type="text" id="edSpeed">
            <label class="info-label">💍 반지</label><input type="text" id="edRing">
            <label class="info-label">🐾 펫</label><input type="text" id="edPet">
            <label class="info-label">📜 스킬 순서</label><input type="text" id="edSkill">
            <label class="info-label">🛡️ 진형</label><input type="text" id="edForm">
            <label class="info-label">📝 특이사항</label><textarea id="edExtra" style="height: 120px;"></textarea>
        </div>
        <button class="btn-gold" id="edSaveBtn" onclick="saveDeckEdit()">✅ 저장 완료</button>
        <button class="btn-gold" onclick="closeDeckEditor()" style="background:#333; color:#fff; margin-top:10px;">취소</button>
    </div>
</div>

<div id="main">
    <header onclick="askAdmin()"><h1>🛡️ GlowingS ARCHIVE</h1></header>
    <div class="search-container"><input type="text" id="mainSearch" class="search-box" placeholder="공략, 영웅, 덱 검색..." onkeyup="handleSearch(event)"></div>
    <div class="content-scroll">
        <div class="container">
            <div id="admin">
                <div id="adminTitle" style="color:var(--gold); font-weight:bold; margin-bottom:15px; font-size:1.1rem;">📤 자료 등록</div>
                <select id="catIn">
                    <option value="photo">📸 사진첩</option>
                    <option value="hero_reg">👤 영웅 등록</option>
                    <option value="video_pve">🎥 PVE 공략</option>
                    <option value="video_pvp">🎥 PVP 공략</option>
                    <option value="deck_reg">⚔️ 전략 덱 등록</option>
                </select>
                <div id="subCatUI" style="display:none;"><label class="info-label">세부 분류</label><select id="subCatIn"></select></div>
                <div id="deckUI" style="display:none; padding:10px; background:rgba(0,0,0,0.2); border-radius:10px; margin-bottom:12px;"><p style="font-size:13px; color:var(--gold);">* 제목만 적고 등록한 뒤, 리스트에서 '수정'을 눌러 상세 정보를 채워주세요.</p></div>
                <div id="heroGradeSet" style="display:none;"><select id="gradeIn"><option value="old">🟣 구세나</option><option value="leg">🟡 전설</option><option value="rare">🔵 희귀</option></select></div>
                <input type="text" id="titIn" placeholder="제목을 입력하세요">
                <label class="check-container"><input type="checkbox" id="mainIn"> 메인 화면(홈)에 표시</label>
                <div id="fileArea"><input type="file" id="fileIn" accept="image/*" style="border:none;"><input type="text" id="linkIn" placeholder="유튜브 링크" style="display:none;"></div>
                <button class="btn-gold" id="upBtn" onclick="doUpload()">💾 저장하기</button>
                <button class="btn-gold" type="button" onclick="downloadBackup()" style="margin-top:10px;">백업 다운로드</button>
                <button class="btn-gold" type="button" onclick="triggerBackupRestore()" style="margin-top:10px;">백업 복원</button>
                <input type="file" id="backupRestoreInput" accept="application/json" style="display:none;">
                <button class="btn-gold" onclick="resetAdmin()" style="background:#333; color:#fff; margin-top:10px;">취소</button>
            </div>
            <div class="sticky-tabs">
                <div class="tabs">
                    <button class="tab-btn active" onclick="goTab('all', this)">홈</button>
                    <button class="tab-btn" onclick="goTab('photo', this)">사진</button>
                    <button class="tab-btn" onclick="goTab('video_pve', this)">PVE</button>
                    <button class="tab-btn" onclick="goTab('video_pvp', this)">PVP</button>
                    <button class="tab-btn" style="border:1px solid var(--gold); color:var(--gold);" onclick="goTab('guild', this)">길드전</button>
                </div>
                <div id="subTabArea" style="display:none;"><div class="sub-tabs" id="subTabList"></div></div>
            </div>
            <div id="list" class="grid"></div>
            <div id="decks" class="grid" style="display:none;"></div>
            <div id="heroes" style="display:none;"></div>
        </div>
    </div>
</div>

<div id="mediaModal" class="modal" onclick="closeModalOnBg(event, 'mediaModal')"><div class="close-circle" onclick="closeModal('mediaModal')">&times;</div><div id="mediaContainer" style="width:100%; max-width:800px; display:flex; justify-content:center;"></div></div>

<div id="deckModal" class="modal" onclick="closeModalOnBg(event, 'deckModal')">
    <div class="modal-content-box">
        <div class="close-circle" onclick="closeModal('deckModal')">&times;</div>
        <div id="deckModalTitle" style="padding:20px; text-align:center; color:var(--gold); font-weight:bold; border-bottom:1px solid #333; flex-shrink:0;"></div>
        <div id="deckModalHeroes"></div>
        <div id="deckModalDetails" class="deck-detail-grid"></div>
        <div id="deckAdminBarContainer" class="admin-edit-bar" style="display:none;"></div>
    </div>
</div>

<div id="heroModal" class="modal" onclick="closeModalOnBg(event, 'heroModal')"><div class="gate-box" style="max-width:400px; width:92%;"><div class="close-circle" onclick="closeModal('heroModal')">&times;</div><img id="mHeroImg" class="hero-img" style="width:90px; height:90px; margin-bottom:10px;"><h3 id="mHeroName" style="color:var(--gold);"></h3><div id="mUsage" style="max-height:280px; overflow-y:auto; text-align:left; margin-top:15px; border-top:1px solid #333; padding-top:10px;"></div></div></div>

<script>
    const CONFIG = {
        API: "https://api.jsonbin.io/v3/b/69ae6f09d0ea881f40ff0f44",
        KEY: "$2a$10$hcOVgg3LvdoRgRZdayPtVOA3gbxyOY7UibDbi/jcJnMlPiok/xlcO",
        CLOUD: "djef3ylqf",
        PRESET: "guild_preset"
    };

    let db = { posts: [] }, isAdmin = false, curFilter = "all", curSub = "전체", keyword = "", editId = null;

    const escapeHTML = (str = "") =>
        String(str).replace(/[&<>"']/g, m => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
        }[m]));

    const generateId = () => `${Date.now()}_${Math.random().toString(16).slice(2, 10)}`;

    const autoBackup = () => {
        try {
            localStorage.setItem("GS_backup", JSON.stringify(db));
            localStorage.setItem("GS_backup_meta", JSON.stringify({
                savedAt: new Date().toISOString(),
                count: Array.isArray(db.posts) ? db.posts.length : 0
            }));
        } catch (e) {
            console.warn("백업 저장 실패:", e);
        }
    };

    const createBackupPayload = (posts) => ({
        version: 1,
        exportedAt: new Date().toISOString(),
        count: Array.isArray(posts) ? posts.length : 0,
        posts: Array.isArray(posts) ? posts : []
    });

    const downloadJsonFile = (filename, payload) => {
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    };

    const getYTubeId = (url) => {
        const m = (url || "").match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/|.*shorts\/))([^&?]+)/);
        return m ? m[1] : null;
    };

    const safeImageUrl = (url) => {
        if (!url) return "https://via.placeholder.com/400x225/1c2b3e/gold?text=GlowingS";
        try {
            const parsed = new URL(url, window.location.href);
            if (parsed.protocol === "http:" || parsed.protocol === "https:") return parsed.href;
        } catch (e) {}
        return "https://via.placeholder.com/400x225/1c2b3e/gold?text=GlowingS";
    };

    const dom = {
        gatekeeper: () => document.getElementById("gatekeeper"),
        main: () => document.getElementById("main"),
        admin: () => document.getElementById("admin"),
        catIn: () => document.getElementById("catIn"),
        subCatIn: () => document.getElementById("subCatIn"),
        subCatUI: () => document.getElementById("subCatUI"),
        deckUI: () => document.getElementById("deckUI"),
        heroGradeSet: () => document.getElementById("heroGradeSet"),
        gradeIn: () => document.getElementById("gradeIn"),
        titIn: () => document.getElementById("titIn"),
        mainIn: () => document.getElementById("mainIn"),
        fileArea: () => document.getElementById("fileArea"),
        fileIn: () => document.getElementById("fileIn"),
        linkIn: () => document.getElementById("linkIn"),
        backupRestoreInput: () => document.getElementById("backupRestoreInput"),
        adminTitle: () => document.getElementById("adminTitle"),
        upBtn: () => document.getElementById("upBtn"),
        list: () => document.getElementById("list"),
        decks: () => document.getElementById("decks"),
        heroes: () => document.getElementById("heroes"),
        subTabArea: () => document.getElementById("subTabArea"),
        subTabList: () => document.getElementById("subTabList"),
        mediaModal: () => document.getElementById("mediaModal"),
        mediaContainer: () => document.getElementById("mediaContainer"),
        deckModal: () => document.getElementById("deckModal"),
        deckModalTitle: () => document.getElementById("deckModalTitle"),
        deckModalHeroes: () => document.getElementById("deckModalHeroes"),
        deckModalDetails: () => document.getElementById("deckModalDetails"),
        deckAdminBarContainer: () => document.getElementById("deckAdminBarContainer"),
        mHeroImg: () => document.getElementById("mHeroImg"),
        mHeroName: () => document.getElementById("mHeroName"),
        mUsage: () => document.getElementById("mUsage"),
        deckEditor: () => document.getElementById("deckEditor"),
        edTit: () => document.getElementById("edTit"),
        edType: () => document.getElementById("edType"),
        edMain: () => document.getElementById("edMain"),
        edP1: () => document.getElementById("edP1"),
        edP2: () => document.getElementById("edP2"),
        edP3: () => document.getElementById("edP3"),
        edSpeed: () => document.getElementById("edSpeed"),
        edRing: () => document.getElementById("edRing"),
        edPet: () => document.getElementById("edPet"),
        edSkill: () => document.getElementById("edSkill"),
        edForm: () => document.getElementById("edForm"),
        edExtra: () => document.getElementById("edExtra"),
        edSaveBtn: () => document.getElementById("edSaveBtn")
    };

    const getLatestPosts = async () => {
        const res = await fetch(`${CONFIG.API}/latest`, {
            headers: { "X-Master-Key": CONFIG.KEY, "X-Bin-Meta": "false" },
            cache: "no-store"
        });
        if (!res.ok) throw new Error("데이터 로드 실패");
        const data = await res.json();
        return Array.isArray(data.posts) ? data.posts : [];
    };

    const putPosts = async (posts) => {
        const res = await fetch(CONFIG.API, {
            method: "PUT",
            headers: { "Content-Type": "application/json", "X-Master-Key": CONFIG.KEY },
            body: JSON.stringify({ posts })
        });
        if (!res.ok) throw new Error("서버 저장 실패");
        db.posts = posts;
        autoBackup();
    };

    const saveSinglePost = async (item) => {
        const posts = await getLatestPosts();
        const index = posts.findIndex(p => String(p.id) === String(item.id));
        if (index >= 0) posts[index] = item;
        else posts.push(item);
        await putPosts(posts);
    };

    const removeSinglePost = async (id) => {
        const posts = await getLatestPosts();
        const nextPosts = posts.filter(p => String(p.id) !== String(id));
        await putPosts(nextPosts);
    };

    const downloadBackup = async () => {
        if (!isAdmin) return alert("관리자만 사용할 수 있습니다.");
        try {
            const posts = await getLatestPosts();
            const payload = createBackupPayload(posts);
            const stamp = new Date().toISOString().replace(/[:.]/g, "-");
            downloadJsonFile(`glowings-backup-${stamp}.json`, payload);
        } catch (e) {
            console.error(e);
            alert("백업 다운로드에 실패했습니다.");
        }
    };

    const triggerBackupRestore = () => {
        if (!isAdmin) return alert("관리자만 사용할 수 있습니다.");
        const input = dom.backupRestoreInput();
        input.value = "";
        input.click();
    };

    const restoreBackup = async (file) => {
        if (!file) return;
        if (!confirm("백업 파일로 복원합니다. 현재 서버 데이터는 복원 직전에 안전 백업됩니다. 계속할까요?")) return;

        try {
            const text = await file.text();
            const parsed = JSON.parse(text);
            if (!parsed || !Array.isArray(parsed.posts)) throw new Error("올바른 백업 파일이 아닙니다.");

            const currentPosts = await getLatestPosts();
            localStorage.setItem("GS_restore_safety_backup", JSON.stringify(createBackupPayload(currentPosts)));

            const normalizedPosts = parsed.posts.map(post => ({
                ...post,
                id: post && post.id != null ? post.id : generateId()
            }));

            await putPosts(normalizedPosts);
            alert(`복원되었습니다. 총 ${normalizedPosts.length}개의 데이터를 적용했습니다.`);
            location.reload();
        } catch (e) {
            console.error(e);
            alert(e.message || "백업 복원에 실패했습니다.");
        }
    };

    window.onload = () => {
        if (sessionStorage.getItem("auth") === "true") {
            dom.gatekeeper().style.display = "none";
            dom.main().style.display = "flex";
            isAdmin = sessionStorage.getItem("admin") === "true";
            if (isAdmin) dom.admin().style.display = "block";
            fetchData();
        }
    };

    const checkGate = () => {
        if (document.getElementById("pw").value === "glowing99") {
            sessionStorage.setItem("auth", "true");
            location.reload();
        }
    };

    const askAdmin = () => {
        if (!isAdmin && prompt("ADMIN CODE:") === "1005") {
            sessionStorage.setItem("admin", "true");
            location.reload();
        }
    };

    const fetchData = async () => {
        try {
            db.posts = await getLatestPosts();
            updateSelectors();
            render();
        } catch (e) {
            console.error("데이터 로드 실패:", e);
            try {
                const backup = JSON.parse(localStorage.getItem("GS_backup") || "null");
                if (backup && Array.isArray(backup.posts)) {
                    db.posts = backup.posts;
                    updateSelectors();
                    render();
                }
            } catch (backupError) {
                console.error("백업 복구 실패:", backupError);
            }
        }
    };

    const updateSelectors = () => {
        const heroes = db.posts
            .filter(p => p.category === "hero_reg" && p.title)
            .sort((a, b) => String(a.title).localeCompare(String(b.title)));

        ["edP1", "edP2", "edP3"].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            let html = '<option value="">선택 안함</option>';
            heroes.forEach(hero => {
                const safeTitle = escapeHTML(hero.title);
                html += `<option value="${safeTitle}">${safeTitle}</option>`;
            });
            el.innerHTML = html;
        });
    };

    const filterHeroSelect = (input, target) => {
        const value = input.value.toLowerCase();
        const select = document.getElementById(target);
        if (!select) return;
        const options = select.options;
        for (let i = 0; i < options.length; i++) {
            const isMatch = options[i].text.toLowerCase().includes(value) || options[i].value === "";
            options[i].style.display = isMatch ? "block" : "none";
            options[i].hidden = !isMatch;
            options[i].disabled = !isMatch;
        }
    };

    const render = () => {
        const listEl = dom.list();
        const decksEl = dom.decks();
        const heroesEl = dom.heroes();
        listEl.innerHTML = "";
        decksEl.innerHTML = "";
        heroesEl.innerHTML = "";
        listEl.style.display = "none";
        decksEl.style.display = "none";
        heroesEl.style.display = "none";

        const hasSub = ["guild", "video_pve", "video_pvp"].includes(curFilter);
        dom.subTabArea().style.display = hasSub ? "block" : "none";

        if (hasSub) {
            let sHtml = `<button class="sub-btn ${curSub === "전체" ? "active-sub" : ""}" onclick="goSub('전체')">전체</button>`;
            if (curFilter === "guild") {
                sHtml += `<button class="sub-btn ${curSub === "offense" ? "active-sub" : ""}" onclick="goSub('offense')">⚔️ 공격 덱</button>`;
                sHtml += `<button class="sub-btn ${curSub === "defense" ? "active-sub" : ""}" onclick="goSub('defense')">🛡️ 방어 덱</button>`;
                sHtml += `<button class="sub-btn ${curSub === "hero" ? "active-sub" : ""}" onclick="goSub('hero')">👤 영웅 도감</button>`;
            } else if (curFilter === "video_pve") {
                ["공성전", "강림", "레이드", "돌발레이드", "무한의탑", "시련의탑", "모험"].forEach(m => {
                    sHtml += `<button class="sub-btn ${curSub === m ? "active-sub" : ""}" onclick="goSub('${m}')">${m}</button>`;
                });
            } else if (curFilter === "video_pvp") {
                ["결투장", "상급 결투장", "실시간 결투장"].forEach(m => {
                    sHtml += `<button class="sub-btn ${curSub === m ? "active-sub" : ""}" onclick="goSub('${m}')">${m}</button>`;
                });
            }
            dom.subTabList().innerHTML = sHtml;
        }

        const filtered = db.posts.filter(p => {
            if (keyword) {
                const k = keyword.toLowerCase();
                const matchTitle = String(p.title || "").toLowerCase().includes(k);
                const matchHero = Array.isArray(p.picks) && p.picks.some(h => String(h || "").toLowerCase().includes(k));
                if (!matchTitle && !matchHero) return false;
            }
            if (curFilter === "all") return p.isMain === true;
            if (curFilter === "guild") {
                if (curSub === "hero") return p.category === "hero_reg";
                if (p.category !== "deck_reg") return false;
                if (curSub !== "전체") return p.deckType === curSub;
                return true;
            }
            if (p.category !== curFilter) return false;
            if (curSub !== "전체") return p.subCategory === curSub;
            return true;
        });

        if (curFilter === "guild" && curSub === "hero") {
            heroesEl.style.display = "block";
            const gm = {
                old: { t: "🟣 구세나", c: "var(--purple)", h: [] },
                leg: { t: "🟡 전설", c: "var(--gold)", h: [] },
                rare: { t: "🔵 희귀", c: "var(--blue)", h: [] }
            };
            filtered.forEach(h => {
                if (gm[h.grade]) gm[h.grade].h.push(h);
                else gm.leg.h.push(h);
            });
            ["old", "leg", "rare"].forEach(g => {
                if (gm[g].h.length > 0) {
                    const sec = document.createElement("div");
                    sec.innerHTML = `<h3 style="color:${gm[g].c}; margin: 25px 0 10px 5px; border-bottom:1px solid #333; padding-bottom:5px;">${gm[g].t}</h3>`;
                    const grid = document.createElement("div");
                    grid.className = "hero-grid";
                    gm[g].h.forEach(h => {
                        const unit = document.createElement("div");
                        unit.className = "hero-unit";
                        unit.innerHTML = `<img src="${safeImageUrl(h.img)}" class="hero-img border-${g}" loading="lazy"><div class="hero-name">${escapeHTML(h.title || "")}</div>`;
                        unit.onclick = () => showHeroDetail(h);
                        grid.appendChild(unit);
                    });
                    sec.appendChild(grid);
                    heroesEl.appendChild(sec);
                }
            });
        } else if (curFilter === "guild" || (curFilter === "all" && filtered.some(p => p.category === "deck_reg"))) {
            decksEl.style.display = "grid";
            [...filtered].reverse().forEach(p => {
                if (p.category === "deck_reg") decksEl.appendChild(createDeckPreviewCard(p));
                else listEl.appendChild(createMediaCard(p));
            });
            if (listEl.children.length > 0) listEl.style.display = "grid";
        } else {
            listEl.style.display = "grid";
            [...filtered].reverse().forEach(p => listEl.appendChild(createMediaCard(p)));
        }
    };

    const createMediaCard = (p) => {
        const div = document.createElement("div");
        div.className = "card";
        const isVideo = String(p.category || "").includes("video");
        const yId = getYTubeId(p.links?.[0]);
        let thumb = "https://via.placeholder.com/400x225/1c2b3e/gold?text=GlowingS";
        if (isVideo && yId) thumb = `https://img.youtube.com/vi/${yId}/hqdefault.jpg`;
        else if (p.links && p.links[0]) thumb = safeImageUrl(p.links[0]);

        div.innerHTML = `<img src="${thumb}" style="width:100%; aspect-ratio:16/9; object-fit:cover;" loading="lazy"><div class="card-header"><div class="card-title">${escapeHTML(p.title || "")}</div>${p.subCategory ? `<div style="font-size:11px; color:#888; margin-top:5px;">[${escapeHTML(p.subCategory)}]</div>` : ""}</div>`;
        if (isVideo) {
            div.innerHTML += `<div class="play-icon">▶️</div>`;
            div.onclick = (e) => { if (!e.target.closest(".admin-edit-bar")) openMedia(p.links?.[0], "video"); };
        } else {
            div.onclick = (e) => { if (!e.target.closest(".admin-edit-bar")) openMedia(thumb, "img"); };
        }
        if (isAdmin) div.appendChild(createAdminBar(p.id, "media"));
        return div;
    };

    const createDeckPreviewCard = (p) => {
        const div = document.createElement("div");
        div.className = "card";
        div.onclick = (e) => { if (!e.target.closest(".admin-edit-bar")) showDeckDetail(p); };

        const heroMap = {};
        db.posts.filter(x => x.category === "hero_reg").forEach(h => { heroMap[h.title] = h; });

        let hHtml = '<div class="deck-heroes-preview">';
        (p.picks || []).forEach(name => {
            if (heroMap[name]) {
                const borderColor = heroMap[name].grade === "old" ? "var(--purple)" : (heroMap[name].grade === "rare" ? "var(--blue)" : "var(--gold)");
                hHtml += `<img src="${safeImageUrl(heroMap[name].img)}" style="width:40px; height:40px; border-radius:50%; border:2px solid ${borderColor}; object-fit:cover;">`;
            }
        });
        hHtml += "</div>";

        div.innerHTML = `<div class="card-header"><div class="card-title">${escapeHTML(p.title || "전략 덱")}</div></div>${hHtml}<div class="deck-preview-text">상세 보기</div>`;
        if (isAdmin) div.appendChild(createAdminBar(p.id, "deck"));
        return div;
    };

    const showDeckDetail = (p) => {
        const heroMap = {};
        db.posts.filter(x => x.category === "hero_reg").forEach(h => { heroMap[h.title] = h; });

        dom.deckModalTitle().innerText = p.title || "";

        let hHtml = '<div class="deck-heroes-row">';
        (p.picks || []).forEach(name => {
            if (heroMap[name]) {
                const borderColor = heroMap[name].grade === "old" ? "var(--purple)" : (heroMap[name].grade === "rare" ? "var(--blue)" : "var(--gold)");
                hHtml += `<div style="text-align:center;"><img src="${safeImageUrl(heroMap[name].img)}" style="width:60px; height:60px; border-radius:50%; border:2px solid ${borderColor}; object-fit:cover;"><div style="font-size:11px; margin-top:8px; color:#fff;">${escapeHTML(name)}</div></div>`;
            }
        });
        hHtml += "</div>";
        dom.deckModalHeroes().innerHTML = hHtml;

        const items = [
            { l: "⚡ 속공", v: p.speed },
            { l: "💍 반지", v: p.ring },
            { l: "🐾 펫", v: p.pet },
            { l: "📜 스킬 순서", v: p.skill },
            { l: "🛡️ 진형", v: p.form },
            { l: "📝 특이사항", v: p.extra, f: true }
        ];

        let iHtml = "";
        items.forEach(item => {
            if (item.v) {
                iHtml += `<div class="deck-info-box ${item.f ? "full" : ""}"><span class="info-label">${item.l}</span><div class="info-value">${escapeHTML(item.v)}</div></div>`;
            }
        });

        dom.deckModalDetails().innerHTML = iHtml || '<p style="grid-column:span 2; text-align:center; color:#555; padding:20px;">정보가 없습니다.</p>';

        const adminBar = dom.deckAdminBarContainer();
        if (isAdmin) {
            adminBar.style.display = "flex";
            adminBar.innerHTML = `<button class="edit-btn" onclick="openDeckEditor('${String(p.id).replace(/'/g, "\\'")}')">수정</button><button class="del-btn" onclick="deleteItem('${String(p.id).replace(/'/g, "\\'")}')">삭제</button>`;
        } else {
            adminBar.style.display = "none";
            adminBar.innerHTML = "";
        }

        dom.deckModal().style.display = "flex";
    };

    window.showDeckDetailById = (id) => {
        const targetDeck = db.posts.find(x => String(x.id) === String(id));
        if (targetDeck) showDeckDetail(targetDeck);
    };

    const showHeroDetail = (h) => {
        dom.mHeroImg().src = safeImageUrl(h.img);
        dom.mHeroName().innerText = h.title || "";

        const borderColor = h.grade === "old" ? "var(--purple)" : (h.grade === "rare" ? "var(--blue)" : "var(--gold)");
        dom.mHeroImg().style.borderColor = borderColor;

        const usage = db.posts.filter(p => p.category === "deck_reg" && (p.picks || []).includes(h.title));
        let html = '<p style="font-size:13px; color:var(--gold); margin-bottom:10px; font-weight:bold;">💡 활용 중인 조합</p>';
        usage.forEach(u => {
            html += `<div style="background:#000; padding:12px; border-radius:8px; margin-bottom:8px; font-size:13px; border-left:3px solid var(--gold); cursor:pointer;" onclick="closeModal('heroModal'); showDeckDetailById('${String(u.id).replace(/'/g, "\\'")}')">${escapeHTML(u.title || "")}</div>`;
        });
        dom.mUsage().innerHTML = usage.length > 0 ? html : '<p style="text-align:center; color:#555; padding:20px;">조합 정보가 없습니다.</p>';
        document.getElementById("heroModal").style.display = "flex";
    };

    window.openDeckEditor = (id) => {
        const deck = db.posts.find(x => String(x.id) === String(id));
        if (!deck) return;

        editId = deck.id;
        dom.edTit().value = deck.title || "";
        dom.edType().value = deck.deckType || "offense";
        dom.edMain().checked = deck.isMain || false;
        dom.edP1().value = deck.picks?.[0] || "";
        dom.edP2().value = deck.picks?.[1] || "";
        dom.edP3().value = deck.picks?.[2] || "";
        dom.edSpeed().value = deck.speed || "";
        dom.edRing().value = deck.ring || "";
        dom.edPet().value = deck.pet || "";
        dom.edSkill().value = deck.skill || "";
        dom.edForm().value = deck.form || "";
        dom.edExtra().value = deck.extra || "";

        dom.deckEditor().style.display = "flex";
        closeModal("deckModal");
        closeModal("heroModal");
        closeModal("mediaModal");
    };

    window.closeDeckEditor = () => {
        if (confirm("수정 중인 내용이 저장되지 않습니다. 닫으시겠습니까?")) {
            dom.deckEditor().style.display = "none";
        }
    };

    const saveDeckEdit = async () => {
        const btn = dom.edSaveBtn();

        if (!dom.edTit().value.trim()) return alert("제목을 입력해주세요.");
        if (![dom.edP1().value, dom.edP2().value, dom.edP3().value].some(Boolean)) return alert("영웅을 1명 이상 선택해주세요.");

        btn.innerText = "저장 중...";
        btn.disabled = true;

        try {
            const target = db.posts.find(x => String(x.id) === String(editId));
            if (!target) throw new Error("수정 대상을 찾을 수 없습니다.");

            target.title = dom.edTit().value.trim();
            target.deckType = dom.edType().value;
            target.isMain = dom.edMain().checked;
            target.picks = [dom.edP1().value, dom.edP2().value, dom.edP3().value].filter(Boolean);
            target.speed = dom.edSpeed().value.trim();
            target.ring = dom.edRing().value.trim();
            target.pet = dom.edPet().value.trim();
            target.skill = dom.edSkill().value.trim();
            target.form = dom.edForm().value.trim();
            target.extra = dom.edExtra().value.trim();

            await saveSinglePost(target);
            alert("수정되었습니다.");
            location.reload();
        } catch (e) {
            console.error(e);
            alert("저장 중 서버 오류가 발생했습니다. 잠시 후 다시 시도하세요.");
        } finally {
            btn.innerText = "✅ 저장 완료";
            btn.disabled = false;
        }
    };

    window.startEdit = (id) => {
        const post = db.posts.find(x => String(x.id) === String(id));
        if (!post) return;
        if (post.category === "deck_reg") return openDeckEditor(id);

        editId = post.id;
        dom.catIn().value = post.category;
        dom.catIn().dispatchEvent(new Event("change"));
        dom.titIn().value = post.title || "";
        dom.mainIn().checked = post.isMain || false;
        if (post.subCategory) dom.subCatIn().value = post.subCategory;
        if (post.category === "hero_reg") dom.gradeIn().value = post.grade || "leg";
        if (String(post.category).includes("video")) dom.linkIn().value = post.links?.[0] || "";
        dom.adminTitle().innerText = "🛠️ 데이터 수정 모드";
        dom.admin().style.display = "block";
        closeModal("deckModal");
        closeModal("heroModal");
        closeModal("mediaModal");
        document.querySelector(".content-scroll").scrollTo(0, 0);
    };

    const doUpload = async () => {
        const btn = dom.upBtn();
        const category = dom.catIn().value;
        const title = dom.titIn().value.trim();

        if (!title) return alert("제목을 입력해주세요.");
        if (!editId) {
            if ((category === "photo" || category === "hero_reg") && dom.fileIn().files.length === 0) return alert("이미지 파일을 첨부해주세요.");
            if (category.includes("video") && !dom.linkIn().value.trim()) return alert("유튜브 링크를 입력해주세요.");
        }

        btn.innerText = "저장 중...";
        btn.disabled = true;

        try {
            let target = editId ? db.posts.find(x => String(x.id) === String(editId)) : { id: generateId() };
            if (!target) throw new Error("저장 대상을 찾을 수 없습니다.");

            target.category = category;
            target.title = title;
            target.isMain = dom.mainIn().checked;

            if (target.category.startsWith("video")) {
                const link = dom.linkIn().value.trim();
                if (!getYTubeId(link)) throw new Error("유효한 유튜브 링크를 입력해주세요.");
                target.subCategory = dom.subCatIn().value;
                target.links = [link];
            } else {
                delete target.subCategory;
            }

            if (target.category === "hero_reg") {
                target.grade = dom.gradeIn().value;
            } else {
                delete target.grade;
            }

            if (target.category === "deck_reg" && !editId) {
                target.deckType = "offense";
            }

            if (target.category === "photo" || target.category === "hero_reg") {
                if (dom.fileIn().files.length > 0) {
                    const fd = new FormData();
                    fd.append("file", dom.fileIn().files[0]);
                    fd.append("upload_preset", CONFIG.PRESET);

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD}/image/upload`, {
                        method: "POST",
                        body: fd
                    });

                    if (!response.ok) throw new Error("이미지 업로드 실패");
                    const data = await response.json();
                    if (!data.secure_url) throw new Error("이미지 업로드 실패");

                    if (target.category === "hero_reg") target.img = data.secure_url;
                    else target.links = [data.secure_url];
                } else if (!editId) {
                    throw new Error("이미지 파일을 첨부해주세요.");
                }
            }

            await saveSinglePost(target);
            location.reload();
        } catch (e) {
            console.error(e);
            alert(e.message || "업로드 중 오류가 발생했습니다.");
        } finally {
            btn.innerText = "💾 저장하기";
            btn.disabled = false;
        }
    };

    const deleteItem = async (id) => {
        if (!confirm("정말로 삭제하시겠습니까?")) return;
        try {
            await removeSinglePost(id);
            render();
            closeModal("deckModal");
        } catch (e) {
            console.error(e);
            alert("삭제 중 오류가 발생했습니다.");
        }
    };

    const createAdminBar = (id, type) => {
        const bar = document.createElement("div");
        bar.className = "admin-edit-bar";
        const safeId = String(id).replace(/'/g, "\\'");
        const editAction = type === "deck" ? `openDeckEditor('${safeId}')` : `startEdit('${safeId}')`;
        bar.innerHTML = `<button class="edit-btn" onclick="${editAction}">수정</button><button class="del-btn" onclick="deleteItem('${safeId}')">삭제</button>`;
        return bar;
    };

    const goTab = (filter, button) => {
        curFilter = filter;
        curSub = "전체";
        document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));
        button.classList.add("active");
        render();
    };

    const goSub = (sub) => {
        curSub = sub;
        render();
    };

    const handleSearch = (e) => {
        keyword = e.target.value;
        render();
    };

    const closeModal = (id) => {
        document.getElementById(id).style.display = "none";
        if (id === "mediaModal") dom.mediaContainer().innerHTML = "";
    };

    const openMedia = (url, type) => {
        const mc = dom.mediaContainer();
        if (type === "video") {
            const yId = getYTubeId(url);
            mc.innerHTML = yId ? `<iframe width="100%" style="aspect-ratio:16/9; border:none; border-radius:10px;" src="https://www.youtube.com/embed/${yId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : `<p>링크 오류</p>`;
        } else {
            mc.innerHTML = `<img src="${safeImageUrl(url)}" style="width:100%; border-radius:10px;">`;
        }
        dom.mediaModal().style.display = "flex";
    };

    const closeModalOnBg = (e, id) => {
        if (e.target.id === id) closeModal(id);
    };

    const resetAdmin = () => {
        editId = null;
        dom.adminTitle().innerText = "📤 자료 등록";
        dom.titIn().value = "";
        dom.fileIn().value = "";
        dom.linkIn().value = "";
        dom.backupRestoreInput().value = "";
        dom.mainIn().checked = false;
        dom.catIn().dispatchEvent(new Event("change"));
    };

    dom.catIn().onchange = (e) => {
        const value = e.target.value;
        dom.deckUI().style.display = value === "deck_reg" ? "block" : "none";
        dom.heroGradeSet().style.display = value === "hero_reg" ? "block" : "none";

        if (value === "video_pve") {
            dom.subCatUI().style.display = "block";
            dom.subCatIn().innerHTML = '<option value="공성전">공성전</option><option value="강림">강림</option><option value="레이드">레이드</option><option value="돌발레이드">돌발레이드</option><option value="무한의탑">무한의탑</option><option value="시련의탑">시련의탑</option><option value="모험">모험</option>';
        } else if (value === "video_pvp") {
            dom.subCatUI().style.display = "block";
            dom.subCatIn().innerHTML = '<option value="결투장">결투장</option><option value="상급 결투장">상급 결투장</option><option value="실시간 결투장">실시간 결투장</option>';
        } else {
            dom.subCatUI().style.display = "none";
            dom.subCatIn().innerHTML = "";
        }

        if (value === "deck_reg") {
            dom.fileArea().style.display = "none";
        } else if (value.includes("video")) {
            dom.fileArea().style.display = "block";
            dom.fileIn().style.display = "none";
            dom.linkIn().style.display = "block";
        } else {
            dom.fileArea().style.display = "block";
            dom.fileIn().style.display = "block";
            dom.linkIn().style.display = "none";
        }
    };

    dom.backupRestoreInput().addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        await restoreBackup(file);
        e.target.value = "";
    });
</script>
</body>
</html>
