<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowingS ARCHIVE</title>
    <style>
        :root { --gold: #d4af37; --red: #ff4444; --blue: #44aaff; --purple: #ff00ff; --bg: #0a0e14; --card: #1c2b3e; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Apple SD Gothic Neo', sans-serif; color: var(--text); height: 100vh; overflow: hidden; }
        
        /* 게이트키퍼 & 메인 구조 */
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .gate-box { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; width: 85%; max-width: 350px; background: #161c24; }
        #main { display: none; flex-direction: column; height: 100vh; }
        header { background: #161c24; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; cursor: pointer; }
        header h1 { color: var(--gold); font-size: 18px; letter-spacing: 2px; }
        .search-container { background: #161c24; padding: 10px 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 30px; font-size: 14px; outline: none; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 100px; }

        /* 탭 메뉴 */
        .sticky-tabs { position: sticky; top: -15px; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tabs { display: flex; justify-content: center; gap: 5px; }
        .tab-btn { background: #1c2b3e; color: #888; border: none; padding: 10px 5px; border-radius: 6px; font-size: 11px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        .sub-tabs { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .sub-tabs::-webkit-scrollbar { display: none; }
        .sub-btn { flex-shrink: 0; padding: 8px 12px; font-size: 11px; background: #0a0e14; color: #666; border: 1px solid #333; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .sub-btn.active-v { border-color: var(--gold); color: var(--gold); font-weight: bold; }
        .sub-btn.active-off { border-color: var(--red); color: var(--red); font-weight: bold; }
        .sub-btn.active-def { border-color: var(--blue); color: var(--blue); font-weight: bold; }
        .sub-btn.active-hero { border-color: var(--gold); color: var(--gold); font-weight: bold; }

        /* 카드 그리드 */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d343e; display: flex; flex-direction: column; position: relative; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; cursor: pointer; position: relative; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-header { padding: 12px; text-align: center; background: rgba(0,0,0,0.5); }
        .card-title { font-size: 13px; color: var(--gold); font-weight: bold; line-height: 1.4; }
        .card-sub-tag { font-size: 10px; color: #888; margin-bottom: 4px; }
        .multi-indicator { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 10px; z-index: 2; border: 1px solid rgba(255,255,255,0.2); }

        /* 뷰어 & 모달 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 10px; }
        .viewer-box { width: 100%; max-width: 900px; background: #000; border-radius: 15px; position: relative; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #333; }
        .btn-close-view { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 26px; cursor: pointer; width: 40px; height: 40px; z-index: 10002; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #viewerContent { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; min-height: 250px; background: #000; }
        .slide-container { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); width: 100%; }
        .slide-item { min-width: 100%; display: flex; align-items: center; justify-content: center; }
        .slide-item img { max-width: 100%; max-height: 75vh; object-fit: contain; }
        .viewer-nav-bar { background: #161c24; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #333; z-index: 10001; }
        .nav-control-btn { background: var(--gold); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .dots { display: flex; gap: 6px; align-items: center; justify-content: center; flex: 1; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: 0.3s; }
        .dot.active { background: var(--gold); transform: scale(1.3); box-shadow: 0 0 8px var(--gold); }

        /* 영웅 도감 UI */
        .grade-divider { width: 100%; padding: 12px 15px; margin: 25px 0 12px 0; background: rgba(212, 175, 55, 0.05); border-left: 4px solid var(--gold); font-size: 14px; font-weight: bold; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; justify-items: center; }
        .hero-unit { cursor: pointer; text-align: center; width: 100%; }
        .hero-img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #444; object-fit: cover; }
        .hero-img.old { border-color: var(--purple); }
        .hero-img.leg { border-color: var(--gold); }
        .hero-img.rare { border-color: var(--blue); }
        .hero-name { font-size: 11px; color: #fff; margin-top: 6px; }

        /* [핵심 개선] 관리자 UI 가독성 보강 */
        #admin { display: none; background: #161c24; padding: 15px; border-radius: 12px; border: 2px solid var(--gold); margin-bottom: 25px; }
        #admin input, #admin select, #admin textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 14px; outline: none; }
        #admin input:focus { border-color: var(--gold); }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* 덱 영웅 선택 그룹 */
        .deck-input-group { background: #0a0e14; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .hero-select-container { margin-bottom: 15px; position: relative; }
        .hero-select-container label { display: block; font-size: 10px; color: var(--gold); margin-bottom: 4px; font-weight: bold; letter-spacing: 1px; }
        .hero-final-select { background: #161c24 !important; border: 1px solid #var(--gold) !important; color: var(--gold) !important; font-weight: bold; }
        
        .admin-edit-bar { display: flex; border-top: 1px solid #333; }
        .edit-btn { background: #1c2b3e; color: #66b2ff; border: none; padding: 12px; flex: 1; cursor: pointer; }
        .del-btn { background: #421010; color: #ff8888; border: none; padding: 12px; flex: 1; border-left: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<div id="gatekeeper"><div class="gate-box"><h2 style="color:var(--gold); margin-bottom:15px;">🛡️ GlowingS</h2><input type="password" id="pw" placeholder="ACCESS CODE" style="width:100%; padding:12px; border-radius:8px; margin-bottom:12px; border:none; text-align:center;"><button class="btn-gold" onclick="checkGate()">ENTER</button></div></div>

<div id="main">
    <header onclick="askAdmin()"><h1>🛡️ GlowingS ARCHIVE</h1></header>
    <div class="search-container"><input type="text" id="mainSearch" class="search-box" placeholder="공략, 영웅, 덱 검색..." onkeyup="handleSearch(event)"></div>

    <div class="content-scroll">
        <div class="container">
            <div id="admin">
                <div id="adminTitle" style="font-size:14px; color:var(--gold); font-weight:bold; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:8px;">📤 자료 등록 및 관리</div>
                
                <span style="font-size:11px; color:#888; margin-left:5px;">카테고리 선택</span>
                <select id="catIn">
                    <option value="photo">📸 사진첩</option>
                    <option value="hero_reg">👤 영웅 등록</option>
                    <option value="video_pve">🎥 PVE 공략 영상</option>
                    <option value="video_pvp">🎥 PVP 공략 영상</option>
                    <option value="deck_reg">⚔️ 전략 덱 등록</option>
                </select>

                <div id="videoSubUI" style="display:none;">
                    <select id="vSubCatIn"></select>
                    <input type="text" id="linkIn" placeholder="유튜브 링크 (https://...)">
                </div>

                <div id="mainCheckUI" style="display:flex; align-items:center; gap:10px; margin-bottom:15px; background:#000; padding:12px; border-radius:8px; border:1px dashed #444;">
                    <input type="checkbox" id="isMain" style="width:18px; height:18px;">
                    <label for="isMain" style="color:var(--gold); font-size:13px; font-weight:bold;">🌟 메인 페이지(홈) 노출</label>
                </div>

                <div id="deckUI" style="display:none;">
                    <div class="deck-input-group">
                        <label style="font-size:11px; color:#888; display:block; margin-bottom:5px;">공수 구분</label>
                        <select id="deckTypeIn"><option value="offense">⚔️ 공격 덱 (Offense)</option><option value="defense">🛡️ 방어 덱 (Defense)</option></select>
                    </div>

                    <div class="deck-input-group">
                        <span style="font-size:11px; color:var(--gold); display:block; margin-bottom:10px; font-weight:bold;">👤 영웅 배치 (검색 후 선택)</span>
                        
                        <div class="hero-select-container">
                            <label>HERO 1</label>
                            <input type="text" placeholder="이름/초성 검색..." onkeyup="filterHeroSelect(this, 'p1')" style="margin-bottom:5px; background:#161c24;">
                            <select id="p1" class="hero-final-select"></select>
                        </div>
                        <div class="hero-select-container">
                            <label>HERO 2</label>
                            <input type="text" placeholder="이름/초성 검색..." onkeyup="filterHeroSelect(this, 'p2')" style="margin-bottom:5px; background:#161c24;">
                            <select id="p2" class="hero-final-select"></select>
                        </div>
                        <div class="hero-select-container">
                            <label>HERO 3</label>
                            <input type="text" placeholder="이름/초성 검색..." onkeyup="filterHeroSelect(this, 'p3')" style="margin-bottom:5px; background:#161c24;">
                            <select id="p3" class="hero-final-select"></select>
                        </div>
                    </div>

                    <div class="deck-input-group">
                        <label style="font-size:11px; color:#888; display:block; margin-bottom:5px;">조합 설명</label>
                        <textarea id="dTxt" placeholder="조합 특징 및 운영 팁을 적어주세요." style="height:80px;"></textarea>
                    </div>
                </div>

                <div id="heroGradeSet" style="display:none;">
                    <span style="font-size:11px; color:#888; margin-left:5px;">등급 설정</span>
                    <select id="gradeIn"><option value="old">🟣 구세나</option><option value="leg">🟡 전설</option><option value="rare">🔵 희귀</option></select>
                </div>

                <div class="deck-input-group" style="background:transparent; border:none; padding:0;">
                    <label style="font-size:11px; color:#888; display:block; margin-bottom:5px;">자료 제목</label>
                    <input type="text" id="titIn" placeholder="자료의 제목을 입력하세요">
                    <div id="fileUI"><input type="file" id="fileIn" multiple accept="image/*"></div>
                </div>

                <button class="btn-gold" id="upBtn" onclick="doUpload()">업로드 및 저장</button>
                <button class="btn-gold" onclick="resetAdmin()" style="background:#333; color:#fff; margin-top:5px;">취소</button>
            </div>

            <div class="sticky-tabs">
                <div class="tabs">
                    <button class="tab-btn active" onclick="goTab('all', this)">홈</button>
                    <button class="tab-btn" onclick="goTab('photo', this)">사진첩</button>
                    <button class="tab-btn" onclick="goTab('video_pve', this)">PVE</button>
                    <button class="tab-btn" onclick="goTab('video_pvp', this)">PVP</button>
                    <button class="tab-btn" style="border:1px solid var(--gold); color:var(--gold);" onclick="goTab('guild', this)">길드전</button>
                </div>
                <div id="subTabArea" style="display:none;"><div class="sub-tabs" id="subTabList"></div></div>
            </div>

            <div id="list" class="grid"></div>
            <div id="decks" class="grid" style="display:none;"></div>
            <div id="heroes" style="display:none;"></div>
        </div>
    </div>
</div>

<div id="heroModal" class="modal" onclick="closeModalOnBg(event, 'heroModal')">
    <div class="gate-box" style="max-width:400px; width:90%; position:relative;">
        <img id="mHeroImg" class="hero-img" style="width:85px; height:85px;">
        <h3 id="mHeroName" style="color:var(--gold); margin-top:15px;"></h3>
        <p id="mHeroGrade" style="font-size:12px; opacity:0.6; margin-bottom:20px;"></p>
        <div id="mUsage" style="max-height:250px; overflow-y:auto; text-align:left;"></div>
        <div id="heroAdminUI" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:15px; gap:10px;">
            <button class="edit-btn" id="heroEditBtn" style="border-radius:8px;">수정</button>
            <button class="del-btn" id="heroDelBtn" style="border-radius:8px;">삭제</button>
        </div>
        <button class="btn-gold" onclick="closeModal('heroModal')" style="margin-top:20px;">닫기</button>
    </div>
</div>

<div id="viewerModal" class="modal" onclick="closeModalOnBg(event, 'viewerModal')">
    <div class="viewer-box" onclick="event.stopPropagation()">
        <button class="btn-close-view" onclick="closeModal('viewerModal')">&times;</button>
        <div id="viewerContent"></div>
        <div id="viewerNav" class="viewer-nav-bar" style="display:none;">
            <button class="nav-control-btn" onclick="moveSlide(-1)">이전</button>
            <div id="viewerDots" class="dots"></div>
            <button class="nav-control-btn" onclick="moveSlide(1)">다음</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        API: "https://api.jsonbin.io/v3/b/69ae6f09d0ea881f40ff0f44",
        KEY: "$2a$10$hcOVgg3LvdoRgRZdayPtVOA3gbxyOY7UibDbi/jcJnMlPiok/xlcO",
        CLOUD: "djef3ylqf", PRESET: "guild_preset"
    };

    const SUB_CATS = {
        video_pve: ["공성전", "모험", "강림", "무한의탑", "시련의탑", "레이드"],
        video_pvp: ["결투장", "상급결투장", "총력전"]
    };

    let db = { posts: [] };
    let isAdmin = false, curFilter = 'all', curSub = '전체', keyword = "", editId = null, curSlide = 0;

    const getChosung = (str) => {
        if(!str) return "";
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    };

    const getYoutubeId = (url) => {
        if(!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null;
    };

    window.onload = () => {
        if(sessionStorage.getItem('auth') === 'true') {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            isAdmin = sessionStorage.getItem('admin') === 'true';
            if(isAdmin) document.getElementById('admin').style.display = 'block';
            fetchData();
        }
    };

    const checkGate = () => { if(document.getElementById('pw').value === 'glowing99') { sessionStorage.setItem('auth', 'true'); location.reload(); } };
    const askAdmin = () => { if(!isAdmin && prompt("ADMIN CODE:") === '1005') { sessionStorage.setItem('admin', 'true'); location.reload(); } };
    
    const fetchData = async () => {
        try {
            const res = await fetch(`${CONFIG.API}/latest`, { headers: { "X-Master-Key": CONFIG.KEY, "X-Bin-Meta": "false" }, cache: 'no-store' });
            const data = await res.json();
            db.posts = Array.isArray(data.posts) ? data.posts : [];
            updateSelectors(); render();
        } catch(e) { console.error(e); }
    };

    const updateSelectors = (filterKeyword = "", targetId = null) => {
        const heroes = db.posts.filter(p => p.category === 'hero_reg').sort((a,b) => (a.title||"").localeCompare(b.title||""));
        const targets = targetId ? [targetId] : ['p1', 'p2', 'p3'];
        targets.forEach(id => {
            const el = document.getElementById(id);
            if(!el) return;
            const currentVal = el.value;
            let h = '<option value="">▼ 선택하세요</option>';
            heroes.forEach(x => {
                const title = x.title || "이름없음";
                const cho = getChosung(title);
                if(!filterKeyword || title.includes(filterKeyword) || cho.includes(filterKeyword)) {
                    h += `<option value="${title}" ${title === currentVal ? 'selected' : ''}>${title}</option>`;
                }
            });
            el.innerHTML = h;
        });
    };

    const filterHeroSelect = (inputEl, targetSelectId) => { updateSelectors(inputEl.value, targetSelectId); };

    const render = () => {
        const listEl = document.getElementById('list'), decksEl = document.getElementById('decks'), heroesEl = document.getElementById('heroes');
        const subTabArea = document.getElementById('subTabArea'), subTabList = document.getElementById('subTabList');
        
        listEl.innerHTML = ''; decksEl.innerHTML = ''; heroesEl.innerHTML = '';
        listEl.style.display = 'none'; decksEl.style.display = 'none'; heroesEl.style.display = 'none';
        subTabArea.style.display = 'none';

        if(['video_pve', 'video_pvp', 'guild'].includes(curFilter)) {
            subTabArea.style.display = 'block';
            let buttons = '';
            if(curFilter === 'guild') {
                buttons = `<button class="sub-btn ${curSub==='offense'?'active-off':''}" onclick="goSub('offense')">⚔️ 공격 덱</button>
                           <button class="sub-btn ${curSub==='defense'?'active-def':''}" onclick="goSub('defense')">🛡️ 방어 덱</button>
                           <button class="sub-btn ${curSub==='hero'?'active-hero':''}" onclick="goSub('hero')">👤 영웅 도감</button>`;
            } else {
                buttons = `<button class="sub-btn ${curSub==='전체'?'active-v':''}" onclick="goSub('전체')">전체</button>`;
                (SUB_CATS[curFilter] || []).forEach(cat => {
                    buttons += `<button class="sub-btn ${curSub===cat?'active-v':''}" onclick="goSub('${cat}')">${cat}</button>`;
                });
            }
            subTabList.innerHTML = buttons;
        }

        let filtered = db.posts.filter(p => {
            const matchKeyword = !keyword || (p.title||"").includes(keyword) || (p.desc||"").includes(keyword);
            if(!matchKeyword) return false;
            if(curFilter === 'all') return p.isMain === true;
            if(curFilter === 'guild') {
                if(curSub === 'hero') return p.category === 'hero_reg';
                return p.category === 'deck_reg' && p.deckType === curSub;
            }
            if(curFilter === 'video_pve') return (p.category === 'video_pve' || p.category === 'video') && (curSub === '전체' || p.subCategory === curSub);
            if(curFilter === 'video_pvp') return p.category === 'video_pvp' && (curSub === '전체' || p.subCategory === curSub);
            return p.category === curFilter;
        });

        if(curFilter === 'guild' && curSub === 'hero') {
            heroesEl.style.display = 'block';
            const grades = [{id:'old',n:'🟣 구세나',c:'var(--purple)'},{id:'leg',n:'🟡 전설',c:'var(--gold)'},{id:'rare',n:'🔵 희귀',c:'var(--blue)'}];
            grades.forEach(g => {
                const group = filtered.filter(h => h.grade === g.id).sort((a,b) => (a.title||"").localeCompare(b.title||""));
                if(group.length > 0) {
                    const d = document.createElement('div'); d.className = 'grade-divider'; d.style.color = g.c; d.style.borderLeftColor = g.c;
                    d.innerHTML = `${g.n} <span style="font-size:10px; opacity:0.5; margin-left:8px;">${group.length}</span>`;
                    heroesEl.appendChild(d);
                    const grid = document.createElement('div'); grid.className = 'hero-grid';
                    group.forEach(h => {
                        const unit = document.createElement('div'); unit.className = 'hero-unit';
                        unit.innerHTML = `<img src="${h.img}" class="hero-img ${h.grade}" loading="lazy"><div class="hero-name">${h.title}</div>`;
                        unit.onclick = () => showHeroDetail(h); grid.appendChild(unit);
                    });
                    heroesEl.appendChild(grid);
                }
            });
        } else if(curFilter === 'guild') {
            decksEl.style.display = 'grid'; [...filtered].reverse().forEach(p => decksEl.appendChild(createDeckCard(p)));
        } else {
            listEl.style.display = 'grid'; [...filtered].reverse().forEach(p => listEl.appendChild(createMediaCard(p)));
        }
    };

    const createMediaCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        let links = Array.isArray(p.links) ? p.links : (p.links ? [p.links] : []);
        let thumb = "https://via.placeholder.com/400x225/1c2b3e/gold?text=Media";
        if((p.category||"").includes('video') && links[0]) { 
            const id = getYoutubeId(links[0]); if(id) thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`; 
        } else if(links[0]) thumb = links[0];
        const subTag = p.subCategory || (p.category === 'video' ? '기존자료' : 'PHOTO');
        const indicator = (p.category === 'photo' && links.length > 1) ? `<div class="multi-indicator">+${links.length}</div>` : (p.category?.includes('video') ? `<div class="multi-indicator" style="background:var(--red)">🎥 ${subTag}</div>` : "");
        div.innerHTML = `<div class="thumb-box" onclick="openViewer(${db.posts.indexOf(p)})"><img src="${thumb}" loading="lazy">${indicator}</div><div class="card-header"><div class="card-sub-tag">${subTag}</div><div class="card-title">${p.title || '제목없음'}</div></div>`;
        if(isAdmin) div.appendChild(createAdminBar(p.id)); return div;
    };

    const createDeckCard = (p) => {
        const div = document.createElement('div'); div.className = 'card';
        const hMap = {}; db.posts.filter(x => x.category === 'hero_reg').forEach(h => hMap[h.title] = h);
        let hHtml = '<div style="display:flex; justify-content:center; gap:8px; padding:15px 0;">';
        (p.picks || []).forEach(n => { if(hMap[n]) hHtml += `<img src="${hMap[n].img}" style="width:42px; height:42px; border-radius:50%; border:2px solid ${hMap[n].grade==='old'?'var(--purple)':(hMap[n].grade==='leg'?'var(--gold)':'var(--blue)')}; object-fit:cover;">`; });
        hHtml += '</div>';
        div.innerHTML = `<div class="card-header"><div class="card-title">${p.title || '전략 덱'}</div></div>${hHtml}<div style="padding:15px; font-size:12px; color:#aaa; text-align:center; white-space:pre-wrap;">${p.desc || ''}</div>`;
        if(isAdmin) div.appendChild(createAdminBar(p.id)); return div;
    };

    const showHeroDetail = (h) => {
        mHeroImg.src = h.img; mHeroImg.className = `hero-img ${h.grade}`;
        mHeroName.innerText = h.title;
        mHeroGrade.innerText = h.grade === 'old' ? '구세나 영웅' : (h.grade === 'leg' ? '전설 영웅' : '희귀 영웅');
        const usage = db.posts.filter(p => p.category === 'deck_reg' && (p.picks||[]).includes(h.title));
        let uHtml = '<p style="font-size:12px; color:var(--gold); margin-bottom:10px; font-weight:bold;">💡 활용 조합</p>';
        if(usage.length > 0) usage.forEach(u => uHtml += `<div style="background:#0a0e14; padding:10px; border-radius:8px; margin-bottom:8px; border-left:3px solid var(--gold);"><div style="font-size:10px; color:#888;">${u.deckType==='offense'?'⚔️ 공격':'🛡️ 방어'}</div><div style="font-size:13px; font-weight:bold;">${u.title}</div></div>`);
        else uHtml += '<p style="font-size:11px; color:#555; padding:20px 0; text-align:center;">정보 없음</p>';
        mUsage.innerHTML = uHtml;
        if(isAdmin) { heroAdminUI.style.display = 'flex'; heroEditBtn.onclick = () => { closeModal('heroModal'); startEdit(h.id); }; heroDelBtn.onclick = () => { if(confirm("삭제할까요?")) { closeModal('heroModal'); deleteItem(h.id); } }; }
        document.getElementById('heroModal').style.display = 'flex';
    };

    window.startEdit = (id) => {
        const p = db.posts.find(x => x.id === id);
        if(!p) return; editId = id; 
        catIn.value = (p.category === 'video') ? 'video_pve' : p.category; 
        catIn.dispatchEvent(new Event('change'));
        titIn.value = p.title || '';
        isMain.checked = p.isMain === true;
        if(p.category.includes('video')) { vSubCatIn.value = p.subCategory || ''; linkIn.value = Array.isArray(p.links) ? p.links[0] : (p.links || ''); }
        if(p.category === 'hero_reg') gradeIn.value = p.grade || 'leg';
        if(p.category === 'deck_reg') { deckTypeIn.value = p.deckType; p1.value = p.picks?.[0]||''; p2.value = p.picks?.[1]||''; p3.value = p.picks?.[2]||''; dTxt.value = p.desc || ''; }
        adminTitle.innerText = "🛠️ 수정 모드"; document.getElementById('admin').style.display = 'block';
        document.querySelector('.content-scroll').scrollTo({top: 0, behavior: 'smooth'});
    };

    const doUpload = async () => {
        const btn = document.getElementById('upBtn'); if(!titIn.value) return alert("제목 입력 필수");
        btn.innerText = "처리 중..."; btn.disabled = true;
        let t = editId ? db.posts.find(x => x.id === editId) : { id: Date.now() };
        t.category = catIn.value; t.title = titIn.value; t.isMain = isMain.checked;
        if(t.category.startsWith('video')) { t.subCategory = vSubCatIn.value; t.links = [linkIn.value]; }
        if(t.category === 'hero_reg') t.grade = gradeIn.value;
        if(t.category === 'deck_reg') { t.deckType = deckTypeIn.value; t.picks = [p1.value, p2.value, p3.value].filter(x=>x); t.desc = dTxt.value; }
        if(fileIn.files.length > 0) {
            let urls = [];
            for(let f of fileIn.files) {
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', CONFIG.PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD}/image/upload`, { method: 'POST', body: fd });
                const d = await res.json(); urls.push(d.secure_url);
            }
            if(t.category === 'hero_reg') t.img = urls[0]; else t.links = urls;
        }
        if(!editId) db.posts.push(t);
        await saveDB(); location.reload();
    };

    const deleteItem = async (id) => { if(confirm("삭제?")) { db.posts = db.posts.filter(p => p.id !== id); await saveDB(); render(); } };
    const saveDB = async () => { await fetch(CONFIG.API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.KEY }, body: JSON.stringify(db) }); };
    const createAdminBar = (id) => { const bar = document.createElement('div'); bar.className = 'admin-edit-bar'; bar.innerHTML = `<button class="edit-btn" onclick="startEdit(${id})">수정</button><button class="del-btn" onclick="deleteItem(${id})">삭제</button>`; return bar; };
    
    const goTab = (f, b) => { curFilter = f; curSub = (f === 'guild') ? 'offense' : '전체'; document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); };
    const goSub = (s) => { curSub = s; render(); };
    const handleSearch = (e) => { keyword = e.target.value; render(); };
    const resetAdmin = () => { editId = null; adminTitle.innerText = "📤 자료 등록"; titIn.value = ''; dTxt.value = ''; linkIn.value = ''; fileIn.value = ''; isMain.checked = false; };
    
    const openViewer = (idx) => {
        const p = db.posts[idx]; const content = document.getElementById('viewerContent'), dots = document.getElementById('viewerDots'), nav = document.getElementById('viewerNav');
        let links = Array.isArray(p.links) ? p.links : (p.links ? [p.links] : []);
        curSlide = 0; content.innerHTML = ''; dots.innerHTML = ''; nav.style.display = 'none';
        if((p.category||"").includes('video')) { 
            const id = getYoutubeId(links[0]); content.innerHTML = `<div style="width:100%; aspect-ratio:16/9;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`; 
        } else { 
            let h = `<div class="slide-container" id="slideBox">`; links.forEach(u => h += `<div class="slide-item"><img src="${u}"></div>`); h += `</div>`;
            content.innerHTML = h; if(links.length > 1) { nav.style.display = 'flex'; links.forEach((_,i) => dots.innerHTML += `<div class="dot ${i===0?'active':''}"></div>`); }
        }
        document.getElementById('viewerModal').style.display = 'flex';
    };

    const moveSlide = (d) => {
        const box = document.getElementById('slideBox'), dots = document.querySelectorAll('.dot');
        if(!box || !dots.length) return;
        curSlide = (curSlide + d + dots.length) % dots.length;
        box.style.transform = `translateX(-${curSlide*100}%)`;
        dots.forEach((dt,i) => dt.classList.toggle('active', i===curSlide));
    };

    const closeModal = (id) => { document.getElementById(id).style.display = 'none'; if(id==='viewerModal') document.getElementById('viewerContent').innerHTML = ''; };
    const closeModalOnBg = (e, id) => { if(e.target.id === id) closeModal(id); };

    catIn.onchange = (e) => {
        const val = e.target.value;
        deckUI.style.display = val === 'deck_reg' ? 'block' : 'none';
        heroGradeSet.style.display = val === 'hero_reg' ? 'block' : 'none';
        videoSubUI.style.display = val.startsWith('video') ? 'block' : 'none';
        fileUI.style.display = (val === 'photo' || val === 'hero_reg') ? 'block' : 'none';
        mainCheckUI.style.display = (val === 'photo' || val.startsWith('video')) ? 'flex' : 'none';
        if(val.startsWith('video')) {
            let options = ''; (SUB_CATS[val]||[]).forEach(cat => options += `<option value="${cat}">${cat}</option>`);
            vSubCatIn.innerHTML = options;
        }
    };
</script>
</body>
</html>
